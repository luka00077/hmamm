// ==================== NAVIGATION ====================
function navigate(tab) {
    APP.currentTab = tab;
    $$('.nav-links a[data-tab]').forEach(a => a.classList.remove('active'));
    const link = $(`.nav-links a[data-tab="${tab}"]`);
    if (link) link.classList.add('active');
    $('#mainContent').innerHTML = RENDER[tab] ? RENDER[tab]() : RENDER.home();
    window.scrollTo({ top:0, behavior:'smooth' });
}

function showToast(msg, type='success') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.background = type==='error'?'var(--danger)':type==='info'?'var(--accent)':'var(--primary)';
    t.textContent = msg;
    $('#toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function openModal(html) { $('#modalBody').innerHTML = html; $('#modalOverlay').classList.add('active'); }
function closeModal() { $('#modalOverlay').classList.remove('active'); }
$('#modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ==================== AUTH ====================
function login(email, pw) {
    const u = DB.users.find(x => x.email === email && x.password === pw && x.is_active);
    if (!u) { showToast('بيانات الدخول غير صحيحة','error'); return false; }
    APP.token = 'tok_'+u.id; APP.user = u;
    localStorage.setItem('ms_token', APP.token);
    localStorage.setItem('ms_user', JSON.stringify(u));
    updateNav(); showToast(`مرحباً ${u.full_name}!`,'success');
    navigate(u.role==='admin'?'admin':'home'); return true;
}

function register(name, email, pw, uni, year) {
    if (DB.users.find(x => x.email === email)) { showToast('البريد مسجل','error'); return false; }
    if (pw.length < 8) { showToast('كلمة المرور قصيرة','error'); return false; }
    const u = { id:DB.nextUserId++, full_name:name, email, password:pw, role:'student', university:uni, academic_year:year, is_active:true };
    DB.users.push(u); APP.token = 'tok_'+u.id; APP.user = u;
    localStorage.setItem('ms_token', APP.token);
    localStorage.setItem('ms_user', JSON.stringify(u));
    updateNav(); showToast('تم إنشاء الحساب!','success');
    navigate('home'); return true;
}

function logout() {
    APP.token = null; APP.user = null;
    localStorage.removeItem('ms_token'); localStorage.removeItem('ms_user');
    updateNav(); showToast('تم تسجيل الخروج','success'); navigate('home');
}

function updateNav() {
    const li = APP.isLoggedIn();
    $('#loginLink').style.display = li ? 'none' : '';
    $('#registerLink').style.display = li ? 'none' : '';
    $('#logoutLink').style.display = li ? '' : 'none';
    $('#adminLink').style.display = APP.isAdmin() ? '' : 'none';
}

function filterLibCat(cat) {

    $$('#booksGrid .book-card').forEach(c => c.style.display = !cat || c.dataset.cat === cat ? '' : 'none');
}
function downloadBook(id) {
    if (!APP.isLoggedIn()) { showToast('سجل دخول أولاً','error'); navigate('login'); return; }
    const b = DB.books.find(x => x.id===id);
    if (b) { b.downloads++; showToast(`📥 جاري تحميل: ${b.title} (${b.fileSize})`,'success'); }

// ==================== QUIZZES ====================
function startQuiz(qid) {
    if (!APP.isLoggedIn()) { showToast('سجل دخول أولاً','error'); navigate('login'); return; }
    const quiz = DB.quizzes.find(q => q.id===qid);
    if (!quiz) return;
    APP.quizState = { quiz, answers:{}, timeLeft:quiz.time*60, timer:null };
    $('#quizList').style.display = 'none';
    $('#quizArea').style.display = 'block';
    $('#quizArea').innerHTML = `
        <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;"><h2>${quiz.title}</h2><div class="timer" id="timerDisplay">${fmtTime(APP.quizState.timeLeft)}</div></div>
        ${quiz.questions.map((q,i) => `
            <div class="card" style="margin-bottom:1rem;"><h3>س ${i+1}: ${q.text}</h3><div style="margin-top:1rem;">
                ${['A','B','C','D'].map(o => `<div class="quiz-option" onclick="selectQAns(${q.id},'${o}')" id="qo_${q.id}_${o}">${o}) ${q[o.toLowerCase()]}</div>`).join('')}
            </div></div>
        `).join('')}
        <button class="btn btn-gold" style="width:100%;padding:1rem;font-size:1.1rem;" onclick="submitQuiz()"><i class="fas fa-check-circle"></i> تقديم الإجابات</button></div>`;
    APP.quizState.timer = setInterval(() => {
        APP.quizState.timeLeft--;
        const td = $('#timerDisplay'); if (td) td.textContent = fmtTime(APP.quizState.timeLeft);
        if (APP.quizState.timeLeft <= 0) { clearInterval(APP.quizState.timer); submitQuiz(); }
    }, 1000);
}

function selectQAns(qid, opt) {
    APP.quizState.answers[qid] = opt;
    ['A','B','C','D'].forEach(o => { const el = $('#qo_'+qid+'_'+o); if (el) el.classList.remove('selected'); });
    const el = $('#qo_'+qid+'_'+opt); if (el) el.classList.add('selected');
}

function submitQuiz() {
    clearInterval(APP.quizState.timer);
    const quiz = APP.quizState.quiz;
    let correct = 0;
    quiz.questions.forEach(q => { if (APP.quizState.answers[q.id] === q.correct) correct++; });
    const score = Math.round((correct/quiz.questions.length)*100);
    const passed = score >= quiz.passing;
    $('#quizArea').innerHTML = `
        <div class="card" style="text-align:center;">
            <i class="fas ${passed?'fa-trophy':'fa-book'}" style="font-size:5rem;color:${passed?'var(--gold)':'var(--danger)'};margin-bottom:1rem;"></i>
            <h2 style="color:${passed?'var(--success)':'var(--danger)'};">${passed?'🎉 مبروك! ناجح':'📚 راسب - حاول مجدداً'}</h2>
            <p style="font-size:2.5rem;margin:1.5rem 0;font-weight:900;">${score}%</p>
            <p>✅ ${correct} / ❌ ${quiz.questions.length-correct} من ${quiz.questions.length}</p>
            ${quiz.questions.map((q,i) => `<div class="alert ${APP.quizState.answers[q.id]===q.correct?'alert-success':'alert-danger'}" style="text-align:right;margin-top:0.5rem;"><strong>س${i+1}:</strong> إجابتك: ${APP.quizState.answers[q.id]||'لم تجب'} | ✓ ${q.correct}<br><small>${q.explain}</small></div>`).join('')}
            <button class="btn btn-primary" onclick="navigate('quizzes')" style="margin-top:1.5rem;">العودة</button></div>`;
}

function fmtTime(s) { const m=Math.floor(s/60), sec=s%60; return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }

    const t = $('#lectureInput')?.value.trim();
    if (!t) return showToast('أدخل النص','error');
    $('#summaryResult').innerHTML = `<div class="alert alert-info"><strong>ملخص:</strong> تم تحليل ${t.length} حرف. النقاط الرئيسية مستخرجة.</div>`;
}
function simulateECG() {
    const r = ['نظم جيبي طبيعي 70bpm','رجفان أذيني 110bpm','تسرع بطيني 150bpm','احصار AV درجة 1','انقلاب موجة T','ارتفاع ST احتشاء'];
    showToast('🫀 '+r[Math.floor(Math.random()*r.length)],'info');
}

document.addEventListener('DOMContentLoaded', () => { updateNav(); navigate('home'); });
