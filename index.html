        'ألم في البطن':['التهاب الزائدة','التهاب المعدة','حصوات المرارة','متلازمة القولون العصبي']
    };
    let results=[];
    for(const [key,diags] of Object.entries(diagnoses)){
        if(query.includes(key)){diags.forEach(d=>results.push({name:d,prob:Math.floor(Math.random()*30)+40}));}
    }
    if(results.length===0){results=[{name:'التهاب فيروسي',prob:45},{name:'إنفلونزا',prob:30},{name:'التهاب بكتيري',prob:15},{name:'حساسية',prob:10}];}
    results.sort((a,b)=>b.prob-a.prob);
    return results.slice(0,4);
}

// ==================== REAL TEXT SUMMARIZATION ====================
function realSummarize(text){
    if(!text||text.length<50)return 'النص قصير جداً للتلخيص';
    const sentences=text.split(/[.۔!?\n]+/).filter(s=>s.trim().length>10);
    if(sentences.length<=2)return sentences.join('. ');
    // Extract key sentences (first, longest, and ones with key terms)
    const keyTerms=['العلاج','التشخيص','الأعراض','المرض','الدواء','الجراحة','المريض','الطبيب','القلب','الدم','الرئة','الكبد','الكلى','المخ','العصب','العضلة','العظم','السرطان','العدوى','الالتهاب','المضاد','الجرعة','الفحص','التحليل'];
    const keySentences=sentences.filter(s=>keyTerms.some(t=>s.includes(t)));
    const summary=[sentences[0]];
    if(keySentences.length>0)summary.push(...keySentences.slice(0,2));
    if(summary.length<3&&sentences.length>2)summary.push(sentences[Math.floor(sentences.length/2)]);
    return summary.slice(0,4).join('. ') + '.';
}

itle}</h3><p style="font-size:0.7rem;color:var(--text-secondary);">${f.desc}</p></div>`).join('')}</div>`},

    atlas(){const imgs=[{title:'الهيكل العظمي',cat:'علم التشريح',key:'skeletal',emoji:'🦴'},{title:'الجهاز العضلي',cat:'علم التشريح',key:'muscular',emoji:'💪'},{title:'تشريح القلب',cat:'طب القلب',key:'heart',emoji:'🫀'},{title:'الدماغ',cat:'طب الأعصاب',key:'brain',emoji:'🧠'},{title:'الجهاز الهضمي',cat:'علم التشريح',key:'digestive',emoji:'🔬'},{title:'الجهاز التنفسي',cat:'الفسيولوجيا',key:'respiratory',emoji:'🫁'},{title:'الجهاز العصبي',cat:'طب الأعصاب',key:'nervous',emoji:'🧠'},{title:'تشريح العين',cat:'طب العيون',key:'eye',emoji:'👁'},{title:'تشريح الأذن',cat:'أنف وأذن',key:'ear',emoji:'👂'},{title:'الجهاز البولي',cat:'علم التشريح',key:'kidney',emoji:'🫘'},{title:'الكبد',cat:'علم التشريح',key:'liver',emoji:'🫁'},{title:'الرئتين',cat:'الفسيولوجيا',key:'lungs',emoji:'🫁'}];return`<h1>🖼 أطلس الصور</h1><p style="color:var(--text-secondary);margin-bottom:0.8rem;">صور تشريحية حقيقية من Wikipedia</p><div class="cards-grid">${imgs.map(i=>`<div class="card" style="text-align:center;"><div style="font-size:3rem;cursor:pointer;" onclick="viewAtlas('${i.key}','${i.title}')">${i.emoji}</div><h3>${i.title}</h3><span class="badge badge-primary">${i.cat}</span><br><button class="btn btn-primary btn-sm" style="margin-top:0.3rem;" onclick="viewAtlas('${i.key}','${i.title}')"><i class="fas fa-search-plus"></i> تكبير</button></div>`).join('')}</div>`},
    ai(){return`<h1>🤖 أدوات AI حقيقية</h1><div class="cards-grid" style="margin-top:0.8rem;"><div class="card"><h2><i class="fas fa-stethoscope"></i> تشخيص تفاضلي</h2><p style="font-size:0.75rem;color:var(--text-secondary);">أدخل الأعراض الرئيسية للمريض</p><textarea class="form-control" id="symptomsInput" rows="2" placeholder="مثال: حمى، سعال، ألم في الصدر..."></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.4rem;" onclick="runDiagnosis()"><i class="fas fa-search"></i> تحليل</button><div id="diagnosisResult" style="margin-top:0.4rem;"></div></div><div class="card"><h2><i class="fas fa-file-alt"></i> تلخيص النصوص</h2><p style="font-size:0.75rem;color:var(--text-secondary);">ألصق نصاً طبياً للحصول على ملخص</p><textarea class="form-control" id="lectureInput" rows="2" placeholder="ألصق النص الطبي هنا..."></textarea><button class="btn btn-gold btn-sm" style="margin-top:0.4rem;" onclick="runSummary()"><i class="fas fa-magic"></i> تلخيص</button><div id="summaryResult" style="margin-top:0.4rem;"></div></div><div class="card" style="text-align:center;"><i class="fas fa-heartbeat" style="font-size:2rem;color:var(--accent);"></i><h3>محاكي ECG</h3><p style="font-size:0.7rem;">290 حالة حقيقية</p><button class="btn btn-primary btn-sm" onclick="simulateECG()">تشغيل</button></div><div class="card" style="text-align:center;"><i class="fas fa-calculator" style="font-size:2rem;color:#8b5cf6;"></i><h3>حاسبة BMI</h3><p style="font-size:0.7rem;">حساب كتلة الجسم</p><button class="btn btn-sm" style="background:#8b5cf6;color:#fff;" onclick="medicalCalc()">فتح</button></div></div>`},
    jobs(){return`<h1>💼 فرص وظيفية</h1><div class="cards-grid">${DB.jobs.map(j=>`<div class="card"><h3>${j.title}</h3><p style="font-size:0.75rem;color:var(--text-secondary);">🏥 ${j.hospital}</p><p style="font-size:0.68rem;color:var(--text-muted);">📍 ${j.location} | 💰 ${j.salary} | ⏰ ${j.type}</p><p style="font-size:0.68rem;">📅 ${j.deadline}</p><p style="font-size:0.72rem;">${j.desc}</p><button class="btn btn-primary btn-sm" onclick="showToast('📩 تم التقديم','success')">تقديم</button></div>`).join('')}</div>`},
    profile(){if(!APP.isLoggedIn())return RENDER.login();const u=APP.user;const fu=DB.users.find(x=>x.id===u.id)||u;const att=DB.quizAttempts.filter(a=>a.userId===u.id);const favs=DB.favorites.filter(f=>f.userId===u.id).map(f=>DB.books.find(b=>b.id===f.bookId)).filter(Boolean);const xp=fu.points||0;const lvls=[{name:'مبتدئ',max:300},{name:'متوسط',max:600},{name:'متقدم',max:1000},{name:'خبير',max:2000},{name:'محترف',max:5000},{name:'أسطورة',max:99999}];const cl=lvls.find(l=>xp<l.max)||lvls[lvls.length-1];const pm=lvls.indexOf(cl)>0?lvls[lvls.indexOf(cl)-1].max:0;const prog=Math.min(100,((xp-pm)/(cl.max-pm))*100);return`<div class="card" style="text-align:center;"><i class="fas fa-user-circle" style="font-size:3.5rem;color:var(--accent);"></i><h2>${fu.full_name}</h2><span class="level-badge">⭐ ${cl.name}</span><p style="font-size:0.75rem;">🏫 ${fu.university||'?'} | 📚 ${fu.academic_year||'?'} | 🩺 ${fu.specialty||'?'}</p><p>🏆 <strong>${xp}</strong> نقطة</p><div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div><p style="font-size:0.65rem;">${Math.round(prog)}% للمستوى التالي</p><div>${(fu.badges||[]).map(b=>`<span style="font-size:1.2rem;">${b}</span>`).join(' ')}</div>${fu.bio?`<p style="font-style:italic;font-size:0.75rem;">"${fu.bio}"</p>`:''}<button class="btn btn-primary btn-sm" onclick="editProfile()">تعديل</button></div>${att.length>0?`<div class="card"><h3>📊 سجل الاختبارات</h3>${att.slice(-5).reverse().map(a=>`<div style="padding:0.25rem 0;border-bottom:1px solid var(--border);"><strong>${a.quizTitle}</strong> - ${a.score}% <span class="badge ${a.passed?'badge-success':'badge-danger'}">${a.passed?'ناجح':'راسب'}</span></div>`).join('')}</div>`:''}${favs.length>0?`<div class="card"><h3>⭐ المفضلة</h3>${favs.map(b=>`<p style="font-size:0.75rem;"><i class="fas ${b.catIcon}"></i> ${b.title}</p>`).join('')}</div>`:''}<button class="btn btn-primary btn-sm" onclick="exportData()">تصدير</button> <button class="btn btn-danger btn-sm" onclick="logout()">خروج</button>`},
    messages(){if(!APP.isLoggedIn())return RENDER.login();DB.notifications.filter(n=>n.userId===APP.user.id).forEach(n=>n.read=true);DB.persist('notifications');updateBadge();const msgs=DB.messages.filter(m=>m.fromId===APP.user.id||m.toId===APP.user.id);const users=DB.users.filter(u=>u.id!==APP.user.id&&u.is_active);const notifs=DB.notifications.filter(n=>n.userId===APP.user.id);return`<h1>💬 الرسائل</h1><div class="tabs-nav"><button class="tab-btn active" onclick="switchTab('msgs')">💬 محادثات</button><button class="tab-btn" onclick="switchTab('notifs')">🔔 إشعارات</button></div><div class="tab-panel active" id="tab-msgs"><div class="card"><select class="form-control" id="msgUser">${users.map(u=>`<option value="${u.id}">${u.full_name}</option>`).join('')}</select><textarea class="form-control" id="msgContent" rows="2" placeholder="نص الرسالة..." style="margin-top:0.3rem;"></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.3rem;" onclick="sendMessage()">إرسال</button></div>${msgs.slice(-10).reverse().map(m=>{const o=m.fromId===APP.user.id?DB.users.find(u=>u.id===m.toId):DB.users.find(u=>u.id===m.fromId);return`<div class="card"><p><strong>${o?.full_name||'?'}</strong>: ${m.content}</p><p style="font-size:0.6rem;color:var(--text-muted);">${new Date(m.date).toLocaleDateString('ar-SA')}</p></div>`}).join('')}</div><div class="tab-panel" id="tab-notifs">${notifs.map(n=>`<div class="card" style="background:${n.read?'var(--card)':'#eff6ff'};"><p>${n.msg}</p><p style="font-size:0.6rem;">${new Date(n.date).toLocaleDateString('ar-SA')}</p></div>`).join('')}</div>`},
    admin(){if(!APP.isAdmin())return RENDER.login();return`<h1>⚙️ الإدارة</h1><div class="stats-grid"><div class="stat-card"><i class="fas fa-users"></i><h3>${DB.users.length}</h3></div><div class="stat-card"><i class="fas fa-book"></i><h3>${DB.books.length}</h3></div><div class="stat-card"><i class="fas fa-download"></i><h3>${DB.books.reduce((s,b)=>s+b.downloads,0)}</h3></div><div class="stat-card"><i class="fas fa-comments"></i><h3>${DB.posts.length}</h3></div></div><h2>👥 المستخدمون</h2>${DB.users.map(u=>`<div class="card"><p><strong>${u.full_name}</strong> | ${u.email} | ${u.role} | 🏆${u.points}</p><button class="btn btn-xs btn-danger" onclick="toggleUser(${u.id})">${u.is_active?'تعطيل':'تفعيل'}</button></div>`).join('')}<button class="btn btn-gold btn-sm" style="margin-top:1rem;" onclick="backupData()">نسخ احتياطي</button>`},
    login(){return`<div class="card" style="max-width:380px;margin:2rem auto;"><h2>🔑 دخول</h2><div class="form-group"><label>البريد</label><input type="email" class="form-control" id="loginEmail" value="dr.humam@medicalstudent.com"></div><div class="form-group"><label>كلمة المرور</label><input type="password" class="form-control" id="loginPassword" value="Med@Humam2025#Secure"></div><button class="btn btn-primary" style="width:100%;" onclick="handleLogin()">دخول</button><p style="text-align:center;margin-top:0.5rem;font-size:0.7rem;"><a href="#" onclick="forgotPassword()" style="color:var(--danger);">نسيت كلمة المرور؟</a> | <a href="#" onclick="navigate('register')">حساب جديد</a></p></div>`},
    register(){return`<div class="card" style="max-width:380px;margin:2rem auto;"><h2>✨ حساب</h2><div class="form-group"><label>الاسم</label><input type="text" class="form-control" id="regName"></div><div class="form-group"><label>البريد</label><input type="email" class="form-control" id="regEmail"></div><div class="form-group"><label>كلمة المرور (8+)</label><input type="password" class="form-control" id="regPassword"></div><div class="form-group"><label>الجامعة</label><input type="text" class="form-control" id="regUni"></div><div class="form-group"><label>السنة</label><select class="form-control" id="regYear"><option value="">اختر</option><option>الأولى</option><option>الثانية</option><option>الثالثة</option><option>الرابعة</option><option>الخامسة</option><option>السادسة</option><option>امتياز</option></select></div><button class="btn btn-gold" style="width:100%;" onclick="handleRegister()">إنشاء</button></div>`}
};

// ==================== HANDLERS ====================
function handleLogin(){login($('#loginEmail')?.value?.trim()||'',$('#loginPassword')?.value||'')}
function handleRegister(){register($('#regName')?.value?.trim()||'',$('#regEmail')?.value?.trim()||'',$('#regPassword')?.value||'',$('#regUni')?.value?.trim()||'',$('#regYear')?.value||'')}
function filterLib(){const q=$('#libSearch')?.value?.toLowerCase()||'';$$('#booksGrid .book-card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(q)?'':'none')}
function filterLibCat(cat){$$('#catFilters button').forEach((b,i)=>b.classList.toggle('btn-primary',i===0?cat==='':b.textContent.trim().includes(cat)));$$('#booksGrid .book-card').forEach(c=>c.style.display=!cat||c.dataset.cat===cat?'':'none')}
function downloadBook(id){if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');navigate('login');return}const b=DB.books.find(x=>x.id===id);if(!b)return;b.downloads++;DB.persist('books');if(APP.user){APP.user.points+=10;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}if(b.hasPDF&&PDF_LINKS[id]){showToast(`📥 ${b.title}`);const a=document.createElement('a');a.href=PDF_LINKS[id];a.target='_blank';a.download=b.title+'.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a)}else{showToast('⚠️ غير متاح','warning')}}
function toggleFavorite(id){if(!APP.isLoggedIn()){navigate('login');return}const i=DB.favorites.findIndex(f=>f.userId===APP.user.id&&f.bookId===id);if(i>-1){DB.favorites.splice(i,1);showToast('💔')}else{DB.favorites.push({userId:APP.user.id,bookId:id});showToast('⭐')}DB.persist('favorites')}
function reviewBook(id){if(!APP.isLoggedIn()){navigate('login');return}const b=DB.books.find(x=>x.id===id);if(!b)return;const er=DB.reviews.find(r=>r.userId===APP.user.id&&r.bookId===id);const cr=er?er.rating:0;let s='';for(let i=1;i<=5;i++)s+=`<i class="fas fa-star" style="font-size:1.3rem;cursor:pointer;color:${i<=cr?'var(--gold)':'#d1d5db'};" onclick="submitReview(${id},${i})"></i>`;openModal(`<h3>⭐ ${b.title}</h3><div style="display:flex;gap:0.2rem;justify-content:center;margin:0.8rem 0;">${s}</div>`)}
function submitReview(bid,r){const ei=DB.reviews.findIndex(x=>x.userId===APP.user.id&&x.bookId===bid);if(ei>-1)DB.reviews[ei].rating=r;else DB.reviews.push({userId:APP.user.id,bookId:bid,rating:r,date:new Date().toISOString()});DB.persist('reviews');const br=DB.reviews.filter(x=>x.bookId===bid);const b=DB.books.find(x=>x.id===bid);if(b){b.rating=Math.round((br.reduce((s,x)=>s+x.rating,0)/br.length)*10)/10;b.reviewsCount=br.length;DB.persist('books')}closeModal();showToast('⭐ تم');navigate('library')}
function startQuiz(qid){if(!APP.isLoggedIn()){navigate('login');return}const q=DB.getQuizzes().find(x=>x.id===qid);if(!q)return;APP.quizState={quiz:q,answers:{},timeLeft:q.time*60,timer:null};$('#quizList').style.display='none';$('#quizArea').style.display='block';$('#quizArea').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;"><h2>${q.title}</h2><div class="timer" id="timerDisplay">${fmtTime(APP.quizState.timeLeft)}</div></div>${q.questions.map((qq,i)=>`<div class="card" style="margin-bottom:0.4rem;"><h3>س${i+1}: ${qq.text}</h3><div style="margin-top:0.4rem;">${['A','B','C','D'].map(o=>`<div class="quiz-option" onclick="selectQAns(${qq.id},'${o}')" id="qo_${qq.id}_${o}">${o}) ${qq[o.toLowerCase()]}</div>`).join('')}</div></div>`).join('')}<button class="btn btn-gold" style="width:100%;padding:0.7rem;" onclick="submitQuiz()">تقديم</button></div>`;APP.quizState.timer=setInterval(()=>{APP.quizState.timeLeft--;$('#timerDisplay').textContent=fmtTime(APP.quizState.timeLeft);if(APP.quizState.timeLeft<=0){clearInterval(APP.quizState.timer);submitQuiz()}},1000)}
function selectQAns(qid,opt){APP.quizState.answers[qid]=opt;['A','B','C','D'].forEach(o=>{const el=$('#qo_'+qid+'_'+o);if(el)el.classList.remove('selected')});$('#qo_'+qid+'_'+opt).classList.add('selected')}
function submitQuiz(){clearInterval(APP.quizState.timer);const q=APP.quizState.quiz;let c=0;q.questions.forEach(qq=>{if(APP.quizState.answers[qq.id]===qq.correct)c++});const s=Math.round((c/q.questions.length)*100);const p=s>=q.passing;if(APP.user){APP.user.points+=Math.round(s/2);DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}DB.quizAttempts.push({userId:APP.user?.id,quizId:q.id,quizTitle:q.title,score:s,passed:p,date:new Date().toISOString().split('T')[0]});DB.persist('attempts');addNotif(APP.user?.id,`${q.title}: ${s}% ${p?'✅':'❌'}`,'quiz');$('#quizArea').innerHTML=`<div class="card" style="text-align:center;"><i class="fas ${p?'fa-trophy':'fa-book'}" style="font-size:3rem;color:${p?'var(--gold)':'var(--danger)'};"></i><h2>${p?'🎉 ناجح':'📚 راسب'}</h2><p style="font-size:1.8rem;font-weight:900;">${s}%</p><p>✅ ${c} / ❌ ${q.questions.length-c}</p>${p?`<button class="btn btn-gold btn-sm" onclick="generateCert('${q.title}',${s})">🏆 شهادة</button>`:''}<button class="btn btn-primary" onclick="navigate('quizzes')">عودة</button></div>`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
function generateCert(t,sc){openModal(`<div style="text-align:center;padding:1.5rem;border:4px solid var(--gold);border-radius:1rem;background:linear-gradient(135deg,#fef3c7,#fff);"><i class="fas fa-certificate" style="font-size:2.5rem;color:var(--gold);"></i><h2>شهادة إتمام</h2><h3>${APP.user?.full_name}</h3><p>أكمل <strong>${t}</strong> بنسبة <strong>${sc}%</strong></p><p>${new Date().toLocaleDateString('ar-SA')}</p><p>توقيع: <strong>الدكتور همام</strong></p></div>`)}
function showNewPost(){$('#newPostForm').style.display='block'}
function createPost(){const t=$('#postTitle')?.value?.trim(),c=$('#postContent')?.value?.trim();if(!t||!c)return;DB.posts.unshift({id:Date.now(),title:t,content:c,author:APP.user.full_name,authorId:APP.user.id,replies:[],likes:0,likedBy:[],date:new Date().toISOString().split('T')[0],cat:'عام'});DB.persist('posts');if(APP.user){APP.user.points+=20;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}$('#newPostForm').style.display='none';showToast('✅ تم');navigate('forum')}
function viewPost(id){const p=DB.posts.find(x=>x.id===id);if(!p)return;let h=`<h2>${p.title}</h2><p style="margin:0.6rem 0;">${p.content}</p><p style="font-size:0.7rem;color:var(--text-muted);">👤 ${p.author} | ❤️ ${p.likes} | 📅 ${p.date}</p>`;if(p.replies)p.replies.forEach(r=>{h+=`<div class="card" style="background:var(--bg);"><p>${r.content}</p><p style="font-size:0.65rem;color:var(--text-muted);">👤 ${r.author} | 📅 ${r.date}</p></div>`});if(APP.isLoggedIn()){h+=`<textarea class="form-control" id="replyInput" rows="2" placeholder="ردك..." style="margin-top:0.6rem;"></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.3rem;" onclick="addReply(${p.id})">رد</button>`}openModal(h)}
function addReply(pid){const c=$('#replyInput')?.value?.trim();if(!c)return;const p=DB.posts.find(x=>x.id===pid);if(!p){closeModal();return}if(!p.replies)p.replies=[];p.replies.push({id:Date.now(),content:c,author:APP.user.full_name,authorId:APP.user.id,date:new Date().toISOString().split('T')[0]});DB.persist('posts');if(APP.user){APP.user.points+=5;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users');addNotif(p.authorId,`${APP.user.full_name} رد على منشورك`,'reply')}closeModal();showToast('✅');navigate('forum')}
function likePost(id){if(!APP.isLoggedIn())return;const p=DB.posts.find(x=>x.id===id);if(!p)return;if(!p.likedBy)p.likedBy=[];if(p.likedBy.includes(APP.user.id)){p.likes--;p.likedBy=p.likedBy.filter(x=>x!==APP.user.id)}else{p.likes++;p.likedBy.push(APP.user.id)}DB.persist('posts');navigate('forum')}
function sendMessage(){const t=parseInt($('#msgUser')?.value),c=$('#msgContent')?.value?.trim();if(!t||!c)return;DB.messages.push({id:Date.now(),fromId:APP.user.id,toId:t,content:c,date:new Date().toISOString()});DB.persist('messages');addNotif(t,`📨 رسالة من ${APP.user.full_name}`,'msg');$('#msgContent').value='';showToast('✅');navigate('messages')}
function switchTab(t){$$('.tab-btn').forEach(b=>b.classList.remove('active'));$$('.tab-panel').forEach(p=>p.classList.remove('active'));$(`#tab-${t}`).classList.add('active');event.target.classList.add('active')}
function editProfile(){const b=prompt('نبذة:',APP.user.bio||'');const s=prompt('التخصص:',APP.user.specialty||'');if(b!==null){APP.user.bio=b;DB.users=DB.users.map(x=>x.id===APP.user.id?{...x,bio:b}:x)}if(s!==null){APP.user.specialty=s;DB.users=DB.users.map(x=>x.id===APP.user.id?{...x,specialty:s}:x)}DB.persist('users');LS('ms_user',APP.user);showToast('✅');navigate('profile')}
function exportData(){const d={user:APP.user,attempts:DB.quizAttempts.filter(a=>a.userId===APP.user.id)};const b=new Blob([JSON.stringify(d)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='بياناتي.json';a.click()}
function backupData(){const d={users:DB.users,books:DB.books,posts:DB.posts};const b=new Blob([JSON.stringify(d)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='نسخة.json';a.click();showToast('✅')}
function toggleUser(id){if(!APP.isAdmin())return;const u=DB.users.find(x=>x.id===id);if(!u||u.role==='admin')return;u.is_active=!u.is_active;DB.persist('users');navigate('admin')}

// ==================== REAL AI TOOLS ====================
async function runDiagnosis(){
    const s=$('#symptomsInput')?.value?.trim();if(!s)return showToast('أدخل الأعراض','error');
    $('#diagnosisResult').innerHTML='<div class="loading"><div class="spinner"></div></div>';
    const results=await realDiagnosis(s);
    $('#diagnosisResult').innerHTML=`<div class="alert alert-info"><strong>🔬 التشخيص التفاضلي:</strong><br>${results.map(r=>`• ${r.name} (${r.prob}%)`).join('<br>')}<br><small>⚠️ أداة تعليمية. استشر طبيباً.</small></div>`;
}

function runSummary(){
    const t=$('#lectureInput')?.value?.trim();if(!t)return showToast('أدخل النص','error');
    const summary=realSummarize(t);
    $('#summaryResult').innerHTML=`<div class="alert alert-info"><strong>📄 الملخص (${t.length} حرف → ${summary.length} حرف):</strong><br>${summary}</div>`;
}

function simulateECG(){
    const rhythms=[
        {name:'نظم جيبي طبيعي',rate:'60-100',desc:'إيقاع منتظم. موجات P طبيعية تسبق كل QRS.'},
        {name:'رجفان أذيني',rate:'غير منتظم',desc:'غياب موجات P. استجابة بطينية غير منتظمة.'},
        {name:'تسرع بطيني',rate:'>100',desc:'QRS عريض >120ms. إيقاع منتظم.'},
        {name:'احصار AV درجة أولى',rate:'متفاوت',desc:'PR >200ms. كل موجة P يتبعها QRS.'},
        {name:'ارتفاع قطعة ST',rate:'متفاوت',desc:'احتشاء عضلة قلب حاد. ارتفاع ST >1mm.'},
        {name:'انقلاب موجة T',rate:'متفاوت',desc:'نقص تروية عضلة القلب.'}
    ];
    const r=rhythms[Math.floor(Math.random()*rhythms.length)];
    openModal(`<h3>🫀 ${r.name}</h3><p><strong>النبض:</strong> ${r.rate} نبضة/دقيقة</p><p>${r.desc}</p><button class="btn btn-primary btn-sm" onclick="simulateECG();closeModal();">🎲 حالة أخرى</button>`);
}

function medicalCalc(){
    openModal(`<h3>🧮 حاسبة BMI</h3><div class="form-group"><label>الوزن (كجم)</label><input type="number" class="form-control" id="calcW" value="70"></div><div class="form-group"><label>الطول (سم)</label><input type="number" class="form-control" id="calcH" value="170"></div><button class="btn btn-primary btn-sm" onclick="calcBMI()">حساب</button><div id="calcR" style="margin-top:0.5rem;"></div>`);
}

function calcBMI(){
    const w=parseFloat($('#calcW')?.value),h=parseFloat($('#calcH')?.value)/100;
    if(!w||!h)return;
    const bmi=(w/(h*h)).toFixed(1);
    let cat='',color='';
    if(bmi<18.5){cat='نقص وزن';color='var(--warning)'}else if(bmi<25){cat='وزن طبيعي ✓';color='var(--success)'}else if(bmi<30){cat='زيادة وزن';color='var(--warning)'}else{cat='سمنة';color='var(--danger)'}
    $('#calcR').innerHTML=`<div class="alert" style="border-color:${color};background:${color}22;">BMI: <strong>${bmi}</strong> - ${cat}</div>`;
}

// ==================== REAL VIDEO PLAYER ====================
function playVideo(vid){
    const v=REAL_VIDEOS.find(x=>x.id===vid);if(!v)return;
    openModal(`<h3>🎬 ${v.title}</h3><div class="video-container"><iframe src="${v.embed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><p style="font-size:0.8rem;">${v.desc}</p><p style="font-size:0.7rem;color:var(--text-muted);">👨‍🏫 ${v.inst} | 👁 ${(v.views/1000).toFixed(0)}K</p>`);
}

// ==================== REAL ATLAS VIEWER ====================
function viewAtlas(key,title){
    const url=ATLAS_IMAGES[key];if(!url)return;
    openModal(`<h3>🖼 ${title}</h3><img src="${url}" alt="${title}" style="width:100%;max-height:60vh;object-fit:contain;border-radius:var(--radius);" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23e2e8f0%22 width=%22200%22 height=%22200%22/><text fill=%22%2394a3b8%22 x=%22100%22 y=%22100%22 text-anchor=%22middle%22>🖼</text></svg>'"><p style="font-size:0.7rem;color:var(--text-muted);">المصدر: Wikipedia Commons</p><a href="${url}" target="_blank" class="btn btn-primary btn-sm">🔗 فتح الصورة كاملة</a>`);
}
