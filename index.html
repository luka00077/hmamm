// ==================== NAVIGATION ====================
function navigate(tab){APP.currentTab=tab;$$('.nav-links a[data-tab]').forEach(a=>a.classList.remove('active'));const link=$(`.nav-links a[data-tab="${tab}"]`);if(link)link.classList.add('active');$('#mainContent').innerHTML=RENDER[tab]?RENDER[tab]():RENDER.home();window.scrollTo({top:0,behavior:'smooth'});updateMsgBadge()}
function showToast(msg,type='success'){const t=document.createElement('div');t.className='toast';t.style.background=type==='error'?'var(--danger)':type==='info'?'var(--accent)':'var(--primary)';t.innerHTML=msg;$('#toastContainer').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},2500)}
function openModal(html){$('#modalBody').innerHTML=html;$('#modalOverlay').classList.add('active')}
function closeModal(){$('#modalOverlay').classList.remove('active')}
$('#modalOverlay').addEventListener('click',e=>{if(e.target===$('#modalOverlay'))closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
function toggleDarkMode(){const isDark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',isDark?'light':'dark');LS('ms_theme',isDark?'light':'dark')}
const savedTheme=LS('ms_theme');if(savedTheme)document.documentElement.setAttribute('data-theme',savedTheme);
function addNotification(userId,msg,type){DB.notifications.unshift({id:Date.now(),userId,msg,type,read:false,date:new Date().toISOString()});if(DB.notifications.length>50)DB.notifications=DB.notifications.slice(0,50);DB.persist('notifications');updateMsgBadge()}
function updateMsgBadge(){if(!APP.isLoggedIn())return;const unread=DB.notifications.filter(n=>n.userId===APP.user.id&&!n.read).length;const mc=$('#msgCount');if(mc){mc.textContent=unread||0;mc.style.display=unread>0?'flex':'none'}}
function shareContent(title,text){const url=window.location.href;if(navigator.share){navigator.share({title,text,url}).catch(()=>{})}else{window.open(`https://wa.me/?text=${encodeURIComponent(text+' '+url)}`,'_blank')}}

// ==================== AUTH ====================
function login(email,pw){const u=DB.users.find(x=>x.email===email&&x.password===pw&&x.is_active);if(!u){showToast('❌ بيانات غير صحيحة','error');return false}APP.token='tok_'+u.id;APP.user=u;u.lastSeen=new Date().toISOString();DB.persist('users');LS('ms_token',APP.token);LS('ms_user',u);updateNav();addNotification(u.id,'👋 مرحباً بعودتك!','login');showToast(`👋 ${u.full_name}`,'success');navigate('home');return true}
function register(name,email,pw,uni,year){if(!name||!email||!pw){showToast('❌ جميع الحقول مطلوبة','error');return false}if(DB.users.find(x=>x.email===email)){showToast('❌ البريد مسجل','error');return false}if(pw.length<8){showToast('❌ 8 أحرف','error');return false}const u={id:Date.now(),full_name:name,email,password:pw,role:'student',university:uni||'',academic_year:year||'',is_active:true,points:0,level:'مبتدئ',badges:['📚'],joined:new Date().toISOString().split('T')[0],resetToken:null,lastSeen:new Date().toISOString(),bio:'',specialty:''};DB.users.push(u);DB.persist('users');APP.token='tok_'+u.id;APP.user=u;LS('ms_token',APP.token);LS('ms_user',u);updateNav();addNotification(u.id,'🎉 أهلاً بك في منصة همام!','welcome');showToast('🎉 تم الإنشاء!','success');navigate('home');return true}
function forgotPassword(){const email=prompt('📧 بريدك:');if(!email)return;const u=DB.users.find(x=>x.email===email);if(!u){showToast('❌ غير مسجل','error');return}u.resetToken='reset_'+Date.now();DB.persist('users');showToast('✅ تم الإرسال','success');openModal(`<h3>🔑 استعادة</h3><p>تم إرسال الرمز إلى: <strong>${email}</strong></p><p>الرمز: <strong>${u.resetToken}</strong></p>`)}
function logout(){APP.token=null;APP.user=null;LS('ms_token',null);LS('ms_user',null);updateNav();showToast('👋 تم الخروج');navigate('home')}
function updateNav(){const li=APP.isLoggedIn(),ad=APP.isAdmin();['loginLink','registerLink'].forEach(id=>{const el=$('#'+id);if(el)el.style.display=li?'none':''});['profileLink','msgLink','logoutLink'].forEach(id=>{const el=$('#'+id);if(el)el.style.display=li?'':''});const al=$('#adminLink');if(al)al.style.display=ad?'':'';updateMsgBadge()}

    atlas(){const imgs=[{title:'الهيكل العظمي',cat:'علم التشريح',key:'skeletal',emoji:'🦴'},{title:'الجهاز العضلي',cat:'علم التشريح',key:'muscular',emoji:'💪'},{title:'تشريح القلب',cat:'طب القلب',key:'heart',emoji:'🫀'},{title:'الدماغ',cat:'طب الأعصاب',key:'brain',emoji:'🧠'},{title:'الجهاز الهضمي',cat:'علم التشريح',key:'digestive',emoji:'🔬'},{title:'الجهاز التنفسي',cat:'الفسيولوجيا',key:'respiratory',emoji:'🫁'},{title:'الجهاز العصبي',cat:'طب الأعصاب',key:'nervous',emoji:'🧠'},{title:'تشريح العين',cat:'طب العيون',key:'eye',emoji:'👁'},{title:'تشريح الأذن',cat:'الأنف والأذن',key:'ear',emoji:'👂'},{title:'الجهاز البولي',cat:'علم التشريح',key:'kidney',emoji:'🫘'},{title:'الكبد',cat:'علم التشريح',key:'liver',emoji:'🫁'},{title:'الرئتين',cat:'الفسيولوجيا',key:'lungs',emoji:'🫁'}];return`<h1>🖼 أطلس الصور الطبية</h1><p style="color:var(--text-secondary);margin-bottom:1rem;">${imgs.length} صورة تشريحية حقيقية عالية الدقة</p><div class="cards-grid">${imgs.map(i=>`<div class="card" style="text-align:center;"><div class="atlas-img" style="background:var(--border);display:flex;align-items:center;justify-content:center;font-size:4rem;cursor:pointer;" onclick="viewAtlasImage('${i.key}','${i.title}')">${i.emoji}</div><h3>${i.title}</h3><span class="badge badge-primary">${i.cat}</span><br><button class="btn btn-primary btn-sm" style="margin-top:0.4rem;" onclick="viewAtlasImage('${i.key}','${i.title}')"><i class="fas fa-search-plus"></i> تكبير</button></div>`).join('')}</div>`},
    ai(){return`<h1>🤖 مركز الذكاء الاصطناعي</h1><div class="cards-grid" style="margin-top:1rem;"><div class="card"><h2><i class="fas fa-stethoscope"></i> تشخيص تفاضلي</h2><textarea class="form-control" id="symptomsInput" rows="3" placeholder="أدخل الأعراض..."></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="runDiagnosis()">تحليل</button><div id="diagnosisResult" style="margin-top:0.5rem;"></div></div><div class="card"><h2><i class="fas fa-file-alt"></i> تلخيص ذكي</h2><textarea class="form-control" id="lectureInput" rows="3" placeholder="ألصق النص..."></textarea><button class="btn btn-gold btn-sm" style="margin-top:0.5rem;" onclick="runSummary()">تلخيص</button><div id="summaryResult" style="margin-top:0.5rem;"></div></div><div class="card" style="text-align:center;"><i class="fas fa-heartbeat" style="font-size:2.5rem;color:var(--accent);"></i><h3>محاكي ECG</h3><button class="btn btn-primary btn-sm" onclick="simulateECG()">تشغيل</button></div><div class="card" style="text-align:center;"><i class="fas fa-calculator" style="font-size:2.5rem;color:#8b5cf6;"></i><h3>حاسبة طبية</h3><button class="btn btn-sm" style="background:#8b5cf6;color:#fff;" onclick="medicalCalculator()">فتح</button></div></div>`},
    jobs(){const j=DB.jobs;return`<h1>💼 فرص وظيفية</h1><p style="color:var(--text-secondary);">${j.length} فرصة في أفضل المستشفيات</p><div class="cards-grid">${j.map(j=>`<div class="card"><h3>${j.title}</h3><p style="color:var(--text-secondary);font-size:0.82rem;">🏥 ${j.hospital}</p><p style="font-size:0.75rem;color:var(--text-muted);">📍 ${j.location} | 💰 ${j.salary} | ⏰ ${j.type}</p><p style="font-size:0.72rem;">📅 ${j.deadline}</p><p style="font-size:0.8rem;">${j.desc}</p><button class="btn btn-primary btn-sm" onclick="showToast('📩 تم التقديم','success')">تقديم</button></div>`).join('')}</div>`},
    profile(){if(!APP.isLoggedIn())return RENDER.login();const u=APP.user;const fu=DB.users.find(x=>x.id===u.id)||u;const attempts=DB.quizAttempts.filter(a=>a.userId===u.id);const favs=DB.favorites.filter(f=>f.userId===u.id).map(f=>DB.books.find(b=>b.id===f.bookId)).filter(Boolean);const xp=fu.points||0;const lvls=[{name:'مبتدئ 🟢',max:300},{name:'متوسط 🔵',max:600},{name:'متقدم 🟣',max:1000},{name:'خبير 🟠',max:2000},{name:'محترف 🔴',max:5000},{name:'أسطورة 👑',max:99999}];const cl=lvls.find(l=>xp<l.max)||lvls[lvls.length-1];const pm=lvls.indexOf(cl)>0?lvls[lvls.indexOf(cl)-1].max:0;const prog=Math.min(100,((xp-pm)/(cl.max-pm))*100);return`<div class="card" style="text-align:center;"><i class="fas fa-user-circle" style="font-size:4rem;color:var(--accent);"></i><h2>${fu.full_name}</h2><span class="level-badge">⭐ ${cl.name}</span><p>🏫 ${fu.university||'?'} | 📚 ${fu.academic_year||'?'} | 🩺 ${fu.specialty||'?'}</p><p>🏆 <strong>${xp}</strong> نقطة</p><div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div><p style="font-size:0.7rem;">${Math.round(prog)}% للمستوى التالي</p><div>${(fu.badges||[]).map(b=>`<span style="font-size:1.4rem;">${b}</span>`).join(' ')}</div><p style="font-size:0.7rem;">📅 ${fu.joined} | 🟢 ${fu.lastSeen?new Date(fu.lastSeen).toLocaleDateString('ar-SA'):'الآن'}</p>${fu.bio?`<p style="font-style:italic;">"${fu.bio}"</p>`:''}<button class="btn btn-primary btn-sm" onclick="editProfile()">تعديل</button></div>${attempts.length>0?`<div class="card"><h3>📊 سجل الاختبارات</h3><div class="chart-bar">${attempts.slice(-10).map(a=>`<div style="height:${Math.max(5,a.score)}%" title="${a.quizTitle}: ${a.score}%"><span>${a.score}%</span></div>`).join('')}</div>${attempts.slice(-5).reverse().map(a=>`<div style="padding:0.3rem 0;border-bottom:1px solid var(--border);"><strong>${a.quizTitle}</strong> - ${a.score}% <span class="badge ${a.passed?'badge-success':'badge-danger'}">${a.passed?'ناجح':'راسب'}</span></div>`).join('')}</div>`:''}${favs.length>0?`<div class="card"><h3>⭐ المفضلة</h3>${favs.map(b=>`<p><i class="fas ${b.catIcon}"></i> ${b.title}</p>`).join('')}</div>`:''}<button class="btn btn-primary btn-sm" onclick="exportUserData()">تصدير</button> <button class="btn btn-danger btn-sm" onclick="logout()">خروج</button>`},
    messages(){if(!APP.isLoggedIn())return RENDER.login();const msgs=DB.messages.filter(m=>m.fromId===APP.user.id||m.toId===APP.user.id);const notifs=DB.notifications.filter(n=>n.userId===APP.user.id);notifs.forEach(n=>n.read=true);DB.persist('notifications');updateMsgBadge();const users=DB.users.filter(u=>u.id!==APP.user.id&&u.is_active);return`<h1>💬 الرسائل والإشعارات</h1><div class="tabs-nav"><button class="tab-btn active" onclick="switchMsgTab('messages')">💬 المحادثات</button><button class="tab-btn" onclick="switchMsgTab('notifications')">🔔 الإشعارات</button></div><div class="tab-panel active" id="tab-messages"><div class="card"><h3>📨 رسالة جديدة</h3><select class="form-control" id="msgUser">${users.map(u=>`<option value="${u.id}">${u.full_name}</option>`).join('')}</select><textarea class="form-control" id="msgContent" rows="2" placeholder="نص الرسالة..." style="margin-top:0.4rem;"></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.4rem;" onclick="sendMessage()">إرسال</button></div>${msgs.length===0?'<p>لا رسائل</p>':msgs.slice(-15).reverse().map(m=>{const other=m.fromId===APP.user.id?DB.users.find(u=>u.id===m.toId):DB.users.find(u=>u.id===m.fromId);return`<div class="card"><p><strong>${other?.full_name||'?'}</strong>: ${m.content}</p><p style="font-size:0.65rem;color:var(--text-muted);">${new Date(m.date).toLocaleDateString('ar-SA')}</p></div>`}).join('')}</div><div class="tab-panel" id="tab-notifications">${notifs.length===0?'<p>لا إشعارات</p>':notifs.slice(0,30).map(n=>`<div class="card" style="background:${n.read?'var(--card)':'#eff6ff'};"><p>${n.msg}</p><p style="font-size:0.65rem;">${new Date(n.date).toLocaleDateString('ar-SA')} | ${n.read?'✅':'🔵'}</p></div>`).join('')}</div>`},
    admin(){if(!APP.isAdmin())return RENDER.login();const u=DB.users,b=DB.books,p=DB.posts,r=DB.reports;return`<h1>⚙️ لوحة إدارة همام</h1><div class="stats-grid" style="margin:1rem 0;"><div class="stat-card"><i class="fas fa-users"></i><h3>${u.length}</h3><p>مستخدم</p></div><div class="stat-card"><i class="fas fa-book"></i><h3>${b.length}</h3><p>كتاب</p></div><div class="stat-card"><i class="fas fa-download"></i><h3>${b.reduce((s,b)=>s+b.downloads,0)}</h3><p>تحميل</p></div><div class="stat-card"><i class="fas fa-comments"></i><h3>${p.length}</h3><p>منشور</p></div><div class="stat-card"><i class="fas fa-flag"></i><h3>${r.length}</h3><p>بلاغ</p></div><div class="stat-card"><i class="fas fa-envelope"></i><h3>${DB.messages.length}</h3><p>رسالة</p></div></div><h2>👥 المستخدمون</h2>${u.map(u=>`<div class="card"><p><strong>${u.full_name}</strong> | ${u.email} | ${u.role} | 🏆${u.points}</p><button class="btn btn-xs btn-danger" onclick="toggleUser(${u.id})">${u.is_active?'تعطيل':'تفعيل'}</button></div>`).join('')}<h2 style="margin-top:1rem;">🚩 البلاغات</h2>${r.length===0?'<p>لا بلاغات</p>':r.map(r=>`<div class="card"><p>#${r.postId} | ${r.reason} | ${DB.users.find(u=>u.id===r.userId)?.full_name||'?'}</p></div>`).join('')}<button class="btn btn-gold btn-sm" style="margin-top:1rem;" onclick="backupData()">نسخ احتياطي</button>`},
    login(){return`<div class="card" style="max-width:420px;margin:2rem auto;"><h2>🔑 تسجيل الدخول</h2><div class="form-group"><label>البريد</label><input type="email" class="form-control" id="loginEmail" value="dr.humam@medicalstudent.com"></div><div class="form-group"><label>كلمة المرور</label><input type="password" class="form-control" id="loginPassword" value="Med@Humam2025#Secure"></div><button class="btn btn-primary" style="width:100%;" onclick="handleLogin()">دخول</button><p style="text-align:center;margin-top:0.6rem;font-size:0.8rem;"><a href="#" onclick="forgotPassword()" style="color:var(--danger);">نسيت كلمة المرور؟</a> | <a href="#" onclick="navigate('register')">حساب جديد</a></p></div>`},
    register(){return`<div class="card" style="max-width:420px;margin:2rem auto;"><h2>✨ إنشاء حساب</h2><div class="form-group"><label>الاسم</label><input type="text" class="form-control" id="regName"></div><div class="form-group"><label>البريد</label><input type="email" class="form-control" id="regEmail"></div><div class="form-group"><label>كلمة المرور (8+)</label><input type="password" class="form-control" id="regPassword"></div><div class="form-group"><label>الجامعة</label><input type="text" class="form-control" id="regUni"></div><div class="form-group"><label>السنة</label><select class="form-control" id="regYear"><option value="">اختر</option><option>الأولى</option><option>الثانية</option><option>الثالثة</option><option>الرابعة</option><option>الخامسة</option><option>السادسة</option><option>امتياز</option></select></div><button class="btn btn-gold" style="width:100%;" onclick="handleRegister()">إنشاء</button><p style="text-align:center;margin-top:0.6rem;"><a href="#" onclick="navigate('login')">لديك حساب؟</a></p></div>`}
};

// ==================== HANDLERS ====================
function handleLogin(){login($('#loginEmail')?.value?.trim()||'',$('#loginPassword')?.value||'')}
function handleRegister(){register($('#regName')?.value?.trim()||'',$('#regEmail')?.value?.trim()||'',$('#regPassword')?.value||'',$('#regUni')?.value?.trim()||'',$('#regYear')?.value||'')}
function filterLib(){const q=$('#libSearch')?.value?.toLowerCase()||'';$$('#booksGrid .book-card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(q)?'':'none')}
function filterLibCat(cat){$$('#catFilters button').forEach((b,i)=>b.classList.toggle('btn-primary',i===0?cat==='':b.textContent.trim().includes(cat)));$$('#booksGrid .book-card').forEach(c=>c.style.display=!cat||c.dataset.cat===cat?'':'none')}
function downloadBook(id){if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');navigate('login');return}const b=DB.books.find(x=>x.id===id);if(!b)return;b.downloads++;DB.persist('books');if(APP.user){APP.user.points+=10;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}if(b.hasPDF&&PDF_LINKS[id]){showToast(`📥 ${b.title}`,'success');const a=document.createElement('a');a.href=PDF_LINKS[id];a.target='_blank';a.download=b.title+'.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a)}else{showToast('⚠️ غير متاح','warning')}}
function toggleFavorite(bookId){if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');navigate('login');return}const idx=DB.favorites.findIndex(f=>f.userId===APP.user.id&&f.bookId===bookId);if(idx>-1){DB.favorites.splice(idx,1);showToast('💔 أزيل')}else{DB.favorites.push({userId:APP.user.id,bookId});showToast('⭐ أضيف')}DB.persist('favorites')}
function reviewBook(bookId){if(!APP.isLoggedIn()){navigate('login');return}const b=DB.books.find(x=>x.id===bookId);if(!b)return;const er=DB.reviews.find(r=>r.userId===APP.user.id&&r.bookId===bookId);const cr=er?er.rating:0;let s='';for(let i=1;i<=5;i++)s+=`<i class="fas fa-star" style="font-size:1.5rem;cursor:pointer;color:${i<=cr?'var(--gold)':'#d1d5db'};" onclick="submitReview(${bookId},${i})"></i>`;openModal(`<h3>⭐ ${b.title}</h3><div style="display:flex;gap:0.3rem;justify-content:center;margin:1rem 0;">${s}</div><p>اضغط نجمة</p>`)}
function submitReview(bookId,rating){const ei=DB.reviews.findIndex(r=>r.userId===APP.user.id&&r.bookId===bookId);if(ei>-1)DB.reviews[ei].rating=rating;else DB.reviews.push({userId:APP.user.id,bookId,rating,date:new Date().toISOString()});DB.persist('reviews');const br=DB.reviews.filter(r=>r.bookId===bookId);const avg=br.reduce((s,r)=>s+r.rating,0)/br.length;const b=DB.books.find(x=>x.id===bookId);if(b){b.rating=Math.round(avg*10)/10;b.reviewsCount=br.length;DB.persist('books')}closeModal();showToast('⭐ تم التقييم');navigate('library')}
function startQuiz(qid){if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');navigate('login');return}const q=DB.getQuizzes().find(x=>x.id===qid);if(!q)return;APP.quizState={quiz:q,answers:{},timeLeft:q.time*60,timer:null};$('#quizList').style.display='none';$('#quizArea').style.display='block';$('#quizArea').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;"><h2>${q.title}</h2><div class="timer" id="timerDisplay">${fmtTime(APP.quizState.timeLeft)}</div></div>${q.questions.map((qq,i)=>`<div class="card" style="margin-bottom:0.5rem;"><h3>س${i+1}: ${qq.text}</h3><div style="margin-top:0.5rem;">${['A','B','C','D'].map(o=>`<div class="quiz-option" onclick="selectQAns(${qq.id},'${o}')" id="qo_${qq.id}_${o}">${o}) ${qq[o.toLowerCase()]}</div>`).join('')}</div></div>`).join('')}<button class="btn btn-gold" style="width:100%;padding:0.8rem;" onclick="submitQuiz()">تقديم</button></div>`;APP.quizState.timer=setInterval(()=>{APP.quizState.timeLeft--;const td=$('#timerDisplay');if(td)td.textContent=fmtTime(APP.quizState.timeLeft);if(APP.quizState.timeLeft<=0){clearInterval(APP.quizState.timer);submitQuiz()}},1000)}
function selectQAns(qid,opt){APP.quizState.answers[qid]=opt;['A','B','C','D'].forEach(o=>{const el=$('#qo_'+qid+'_'+o);if(el)el.classList.remove('selected')});$('#qo_'+qid+'_'+opt).classList.add('selected')}
function submitQuiz(){clearInterval(APP.quizState.timer);const q=APP.quizState.quiz;let correct=0;q.questions.forEach(qq=>{if(APP.quizState.answers[qq.id]===qq.correct)correct++});const score=Math.round((correct/q.questions.length)*100);const passed=score>=q.passing;if(APP.user){APP.user.points+=Math.round(score/2);DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}DB.quizAttempts.push({userId:APP.user?.id,quizId:q.id,quizTitle:q.title,score,passed,date:new Date().toISOString().split('T')[0]});DB.persist('attempts');addNotification(APP.user?.id,`${q.title}: ${score}% ${passed?'✅':'❌'}`,'quiz');$('#quizArea').innerHTML=`<div class="card" style="text-align:center;"><i class="fas ${passed?'fa-trophy':'fa-book'}" style="font-size:3.5rem;color:${passed?'var(--gold)':'var(--danger)'};"></i><h2>${passed?'🎉 ناجح':'📚 راسب'}</h2><p style="font-size:2rem;font-weight:900;">${score}%</p><p>✅ ${correct} / ❌ ${q.questions.length-correct} | +${Math.round(score/2)} نقطة</p>${passed?`<button class="btn btn-gold btn-sm" onclick="generateCert('${q.title}',${score})">🏆 شهادة</button>`:''}<button class="btn btn-primary" onclick="navigate('quizzes')">عودة</button></div>`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
function generateCert(title,score){openModal(`<div style="text-align:center;padding:2rem;border:5px solid var(--gold);border-radius:1rem;background:linear-gradient(135deg,#fef3c7,#fff);"><i class="fas fa-certificate" style="font-size:3rem;color:var(--gold);"></i><h2>شهادة إتمام</h2><h3>${APP.user?.full_name}</h3><p>أكمل <strong>${title}</strong> بنسبة <strong>${score}%</strong></p><p>${new Date().toLocaleDateString('ar-SA')}</p><p>توقيع: <strong>الدكتور همام</strong></p></div>`)}
function showNewPost(){$('#newPostForm').style.display='block'}
function createPost(){const t=$('#postTitle')?.value?.trim(),c=$('#postContent')?.value?.trim(),cat=$('#postCat')?.value||'عام';if(!t||!c)return showToast('❌ املأ الحقول','error');DB.posts.unshift({id:Date.now(),title:t,content:c,author:APP.user.full_name,authorId:APP.user.id,replies:[],likes:0,likedBy:[],date:new Date().toISOString().split('T')[0],cat});DB.persist('posts');if(APP.user){APP.user.points+=20;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}$('#newPostForm').style.display='none';showToast('✅ تم النشر +20 نقطة');navigate('forum')}
function viewPost(id){const p=DB.posts.find(x=>x.id===id);if(!p)return;let h=`<h2>${p.title} <span class="badge badge-primary">${p.cat}</span></h2><p style="margin:0.8rem 0;">${p.content}</p><p style="font-size:0.8rem;color:var(--text-muted);">👤 ${p.author} | ❤️ ${p.likes} | 💬 ${p.replies?p.replies.length:0} | 📅 ${p.date}</p><div class="share-btns"><button class="share-btn" style="background:#25D366;" onclick="shareContent('${p.title}','${p.content.substring(0,50)}')"><i class="fab fa-whatsapp"></i></button></div>`;if(p.replies&&p.replies.length>0){h+=`<h4>💬 الردود</h4>`;p.replies.forEach(r=>{h+=`<div class="card" style="background:var(--bg);"><p>${r.content}</p><p style="font-size:0.7rem;color:var(--text-muted);">👤 ${r.author} | 📅 ${r.date}</p></div>`})}if(APP.isLoggedIn()){h+=`<textarea class="form-control" id="replyInput" rows="2" placeholder="ردك..." style="margin-top:0.8rem;"></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.4rem;" onclick="addReply(${p.id})">رد</button>`}openModal(h)}
function addReply(pid){const c=$('#replyInput')?.value?.trim();if(!c)return;const p=DB.posts.find(x=>x.id===pid);if(!p){closeModal();return}if(!p.replies)p.replies=[];p.replies.push({id:Date.now(),content:c,author:APP.user.full_name,authorId:APP.user.id,date:new Date().toISOString().split('T')[0]});DB.persist('posts');if(APP.user){APP.user.points+=5;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users');addNotification(p.authorId,`${APP.user.full_name} رد على منشورك`,'reply')}closeModal();showToast('✅ تم الرد');navigate('forum')}
function likePost(id){if(!APP.isLoggedIn())return;const p=DB.posts.find(x=>x.id===id);if(!p)return;if(!p.likedBy)p.likedBy=[];if(p.likedBy.includes(APP.user.id)){p.likes--;p.likedBy=p.likedBy.filter(x=>x!==APP.user.id)}else{p.likes++;p.likedBy.push(APP.user.id);addNotification(p.authorId,`${APP.user.full_name} أعجب بمنشورك`,'like')}DB.persist('posts');navigate('forum')}
function reportPost(id){if(!APP.isLoggedIn())return;const r=prompt('سبب البلاغ:');if(!r)return;DB.reports.push({id:Date.now(),postId:id,userId:APP.user.id,reason:r,date:new Date().toISOString()});DB.persist('reports');showToast('✅ تم الإبلاغ')}
function sendMessage(){const toId=parseInt($('#msgUser')?.value),c=$('#msgContent')?.value?.trim();if(!toId||!c)return;DB.messages.push({id:Date.now(),fromId:APP.user.id,toId,content:c,date:new Date().toISOString()});DB.persist('messages');addNotification(toId,`📨 رسالة من ${APP.user.full_name}`,'msg');$('#msgContent').value='';showToast('✅ تم الإرسال');navigate('messages')}
function switchMsgTab(t){$$('.tab-btn').forEach(b=>b.classList.remove('active'));$$('.tab-panel').forEach(p=>p.classList.remove('active'));$(`#tab-${t}`).classList.add('active');event.target.classList.add('active')}
function editProfile(){const u=APP.user;const bio=prompt('نبذة:',u.bio||'');const spec=prompt('التخصص:',u.specialty||'');if(bio!==null){u.bio=bio;DB.users=DB.users.map(x=>x.id===u.id?{...x,bio}:x)}if(spec!==null){u.specialty=spec;DB.users=DB.users.map(x=>x.id===u.id?{...x,specialty:spec}:x)}DB.persist('users');LS('ms_user',u);showToast('✅ تم التحديث');navigate('profile')}
function exportUserData(){const d={user:APP.user,attempts:DB.quizAttempts.filter(a=>a.userId===APP.user.id)};const b=new Blob([JSON.stringify(d)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='بياناتي.json';a.click()}
function backupData(){const d={users:DB.users,books:DB.books,posts:DB.posts};const b=new Blob([JSON.stringify(d)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='نسخة_احتياطية.json';a.click();showToast('✅ تم النسخ')}
function toggleUser(id){if(!APP.isAdmin())return;const u=DB.users.find(x=>x.id===id);if(!u||u.role==='admin')return;u.is_active=!u.is_active;DB.persist('users');showToast(u.is_active?'✅ مفعل':'❌ معطل');navigate('admin')}
function runDiagnosis(){const s=$('#symptomsInput')?.value?.trim();if(!s)return;$('#diagnosisResult').innerHTML=`<div class="alert alert-info"><strong>🔬 التحليل:</strong><br>• التهاب تنفسي (45%)<br>• إنفلونزا (30%)<br>• التهاب شعب (15%)<br>• حساسية (10%)<br><small>⚠️ تعليمي فقط</small></div>`}
function runSummary(){const t=$('#lectureInput')?.value?.trim();if(!t)return;$('#summaryResult').innerHTML=`<div class="alert alert-info">📄 ${t.length} حرف | ${t.split(/\s+/).length} كلمة | تم التحليل</div>`}
function simulateECG(){const r=['🫀 نظم جيبي 70bpm','🫀 رجفان أذيني','🫀 تسرع بطيني','🫀 احصار AV','🫀 ارتفاع ST'];showToast(r[Math.floor(Math.random()*r.length)],'info')}
function medicalCalculator(){openModal(`<h3>🧮 حاسبة طبية</h3><div class="form-group"><label>الوزن (كجم)</label><input type="number" class="form-control" id="calcWeight" value="70"></div><div class="form-group"><label>الطول (سم)</label><input type="number" class="form-control" id="calcHeight" value="170"></div><button class="btn btn-primary btn-sm" onclick="calcBMI()">حساب BMI</button><div id="calcResult" style="margin-top:0.5rem;"></div>`)}
function calcBMI(){const w=parseFloat($('#calcWeight')?.value),h=parseFloat($('#calcHeight')?.value)/100;if(!w||!h)return;const bmi=(w/(h*h)).toFixed(1);let cat='';if(bmi<18.5)cat='نقص وزن';else if(bmi<25)cat='وزن طبيعي';else if(bmi<30)cat='زيادة وزن';else cat='سمنة';$('#calcResult').innerHTML=`<div class="alert alert-info">BMI: <strong>${bmi}</strong> - ${cat}</div>`}
function playVideo(vid){const v=REAL_VIDEOS.find(x=>x.id===vid);if(!v)return;openModal(`<h3>${v.title}</h3><div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin:1rem 0;"><iframe src="${v.embed}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div><p>${v.desc}</p><p style="font-size:0.8rem;color:var(--text-muted);">👨‍🏫 ${v.inst} | 👁 ${(v.views/1000).toFixed(0)}K مشاهدة</p>`)}
function viewAtlasImage(key,title){const url=ATLAS_IMAGES[key];if(!url)return;openModal(`<h3>🖼 ${title}</h3><img src="${url}" alt="${title}" style="width:100%;border-radius:var(--radius);margin:1rem 0;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><p style="display:none;text-align:center;font-size:4rem;">🖼</p><p style="font-size:0.75rem;color:var(--text-muted);">المصدر: Wikipedia Commons</p><button class="btn btn-primary btn-sm" onclick="window.open('${url}','_blank')">🔗 فتح الصورة كاملة</button>`)}
document.addEventListener('DOMContentLoaded',()=>{updateNav();navigate('home')});
</script>
</body>
</html>
