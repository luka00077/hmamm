<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <!-- Fonts: Elegant & Readable -->

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    * {

      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #d6d2c4;  /* خلفية خارجية رمادية دافئة */

      color: #2c2b28;
      line-height: 1.55;
    }

    /* حاوية الموقع الرئيسية - أنيقة وحديثة بلمسة كلاسيكية */

      margin: 2rem auto;
      background: #ffffff;

      transition: all 0.2s;
    }

      border-bottom: 1px solid #e9e2d4;
      text-align: center;
    }

    .site-name {

      color: #2b2b2b;
      letter-spacing: -0.5px;
    }

      color: #a3845c;
    }

    .owner-line {
      margin-top: 8px;
      font-size: 0.85rem;
      font-family: monospace;
      letter-spacing: 1px;
      color: #7d6e53;
      border-top: 1px solid #ece3d7;
      display: inline-block;
      padding-top: 10px;
    }

      color: #b49162;
    }

    /* شريط التنقل - انيق */
    .nav-bar {
      background: #f5f2ea;
      border-bottom: 1px solid #e0d6c8;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.2rem;
      padding: 0.6rem 1rem;
    }

    .nav-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.65rem 1.7rem;
      margin: 0 0.1rem;
      font-family: 'Cairo', sans-serif;
      color: #4a4133;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 40px;
    }

    .nav-btn i {
      margin-left: 8px;
    }

    .nav-btn.active {
      background: #2c2b28;
      color: #fef5e6;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .nav-btn:hover:not(.active) {
      background: #e7dfd1;
      color: #1f1c16;
    }

    .content-zone {
      padding: 2rem 2.2rem;
      background: #ffffff;
      min-height: 580px;
    }

    /* بطاقات الخدمات */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }

    .service-card {
      background: #fefcf9;
      border-radius: 24px;
      padding: 1.5rem;
      border: 1px solid #ede6db;
      transition: all 0.25s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
    }

    .service-card:hover {
      transform: translateY(-5px);
      border-color: #cfc2ae;
      box-shadow: 0 15px 25px -12px rgba(0,0,0,0.1);
    }

    .card-icon {
      font-size: 2.3rem;
      color: #a88960;
      margin-bottom: 14px;
    }

    .service-card h3 {
      font-size: 1.45rem;
      font-weight: 700;
      border-right: 4px solid #cfb688;
      padding-right: 12px;
      margin-bottom: 0.8rem;
    }

    .service-card p {
      color: #5a5448;
      margin-bottom: 1rem;
      font-size: 0.88rem;
    }

    .btn-solid {
      display: inline-block;
      background: #f3ede2;
      border: 1px solid #cdc0aa;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4d3f2c;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 30px;
    }

    .btn-solid i {
      margin-left: 5px;
    }

    .btn-solid:hover {
      background: #e5daca;
      border-color: #b2966e;
    }

    /* list styles */
    .benefits-list {
      list-style: none;
      padding: 0;
    }
    .benefits-list li {
      margin-bottom: 12px;
      padding-right: 1.8rem;
      position: relative;
      font-weight: 500;
    }
    .benefits-list li:before {
      content: "▹";
      position: absolute;
      right: 0;
      color: #b28b54;
      font-weight: bold;

      color: #6a5e4b;

      }

      }

  </style>
</head>

  // JavaScript لإدارة التبويبات
  const contentDiv = document.getElementById('mainContent');
  const navButtons = document.querySelectorAll('.nav-btn');

  function renderSection(sectionId) {
    if (TABS[sectionId]) {
      contentDiv.innerHTML = TABS[sectionId];
    } else {
      contentDiv.innerHTML = `<div class="highlight-box">⚠️ هذه الصفحة قيد التطوير من همام، تابع التحديثات.</div>`;
    }
  }

  function setActiveTab(tabId) {
    navButtons.forEach(btn => {
      if (btn.getAttribute('data-tab') === tabId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    renderSection(tabId);
  }

  navButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.getAttribute('data-tab');
      if (tab) setActiveTab(tab);
    });
  });

</html>
