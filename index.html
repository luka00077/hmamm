DB.init();

function navigate(tab){$$('.nav-links a[data-tab]').forEach(a=>a.classList.remove('active'));const link=$(`.nav-links a[data-tab="${tab}"]`);if(link)link.classList.add('active');$('#mainContent').innerHTML=RENDER[tab]?RENDER[tab]():RENDER.home();window.scrollTo({top:0,behavior:'smooth'});updateMsgCount()}
function showToast(msg,type='success'){const t=document.createElement('div');t.className='toast';t.style.background=type==='error'?'var(--danger)':type==='info'?'var(--accent)':'var(--primary)';t.textContent=msg;$('#toastContainer').appendChild(t);setTimeout(()=>t.remove(),3000)}
function openModal(html){$('#modalBody').innerHTML=html;$('#modalOverlay').classList.add('active')}
function closeModal(){$('#modalOverlay').classList.remove('active')}
$('#modalOverlay').addEventListener('click',e=>{if(e.target===$('#modalOverlay'))closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
function toggleDarkMode(){const isDark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',isDark?'light':'dark');LS('ms_theme',isDark?'light':'dark')}
const savedTheme=LS('ms_theme');if(savedTheme)document.documentElement.setAttribute('data-theme',savedTheme);
function addNotification(userId,msg,type){DB.notifications.unshift({id:Date.now(),userId,msg,type,read:false,date:new Date().toISOString()});DB.persist('notifications');updateMsgCount()}
function updateMsgCount(){if(!APP.isLoggedIn())return;const unread=DB.notifications.filter(n=>n.userId===APP.user.id&&!n.read).length;const mc=$('#msgCount');if(mc){mc.textContent=unread;mc.style.display=unread>0?'flex':'none'}}
function shareContent(title,text){const url=window.location.href;const shareData={title,text,url};if(navigator.share){navigator.share(shareData).catch(()=>{})}else{const w=window.open(`https://wa.me/?text=${encodeURIComponent(text+' '+url)}`,'_blank');if(w)w.focus()}}

// Auth
function login(email,pw){const u=DB.users.find(x=>x.email===email&&x.password===pw&&x.is_active);if(!u){showToast('بيانات خاطئة','error');return false}APP.token='tok_'+u.id;APP.user=u;u.lastSeen=new Date().toISOString();DB.persist('users');LS('ms_token',APP.token);LS('ms_user',u);updateNav();addNotification(u.id,'مرحباً بعودتك! 👋','login');showToast(`مرحباً ${u.full_name}!`,'success');navigate('home');return true}
function register(name,email,pw,uni,year){if(DB.users.find(x=>x.email===email)){showToast('البريد مسجل','error');return false}if(pw.length<8){showToast('كلمة المرور 8+','error');return false}const u={id:DB.users.length+1,full_name:name,email,password:pw,role:'student',university:uni,academic_year:year,is_active:true,points:0,level:'مبتدئ',badges:['📚'],joined:new Date().toISOString().split('T')[0],resetToken:null,lastSeen:new Date().toISOString()};DB.users.push(u);DB.persist('users');APP.token='tok_'+u.id;APP.user=u;LS('ms_token',APP.token);LS('ms_user',u);updateNav();addNotification(u.id,'🎉 أهلاً بك في منصة همام!','welcome');showToast('تم إنشاء الحساب!','success');navigate('home');return true}
function forgotPassword(){const email=prompt('أدخل بريدك لاستعادة كلمة المرور:');if(!email)return;const u=DB.users.find(x=>x.email===email);if(!u){showToast('البريد غير مسجل','error');return}u.resetToken='reset_'+Date.now();DB.persist('users');showToast('تم إرسال رابط الاستعادة','success');openModal(`<h3>🔑 استعادة كلمة المرور</h3><p>تم الإرسال إلى: <strong>${email}</strong></p><p>الرمز: <strong>${u.resetToken}</strong></p>`)}
function logout(){APP.token=null;APP.user=null;LS('ms_token',null);LS('ms_user',null);updateNav();showToast('تم الخروج');navigate('home')}
function updateNav(){const li=APP.isLoggedIn();$('#loginLink').style.display=li?'none':'';$('#registerLink').style.display=li?'none':'';$('#profileLink').style.display=li?'':'';$('#msgLink').style.display=li?'':'';$('#logoutLink').style.display=li?'':'';$('#adminLink').style.display=APP.isAdmin()?'':''}

    images(){const imgs=[{title:'هيكل عظمي كامل',cat:'تشريح',emoji:'🦴'},{title:'عضلات الطرف العلوي',cat:'تشريح',emoji:'💪'},{title:'الجهاز العصبي',cat:'تشريح',emoji:'🧠'},{title:'أشعة صدر طبيعية',cat:'أشعة',emoji:'🫁'},{title:'تخطيط قلب طبيعي',cat:'قلب',emoji:'📊'},{title:'شرايين القلب',cat:'قلب',emoji:'🫀'},{title:'الجهاز الهضمي',cat:'تشريح',emoji:'🔬'},{title:'أشعة مقطعية للدماغ',cat:'أشعة',emoji:'🖼'}];return`<h1>🖼 أطلس الصور الطبية</h1><p style="color:var(--text-secondary);margin-bottom:1.2rem;">معرض الصور التشريحية والشعاعية</p><div class="cards-grid">${imgs.map(i=>`<div class="card" style="text-align:center;"><div style="font-size:4rem;">${i.emoji}</div><h3>${i.title}</h3><span class="badge badge-primary">${i.cat}</span><br><button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="showToast('🖼 عرض: ${i.title}','info')">عرض الصورة</button></div>`).join('')}</div>`},

    profile(){if(!APP.isLoggedIn())return RENDER.login();const u=APP.user;const attempts=DB.quizAttempts.filter(a=>a.userId===u.id);const favs=DB.favorites.filter(f=>f.userId===u.id).map(f=>DB.books.find(b=>b.id===f.bookId)).filter(Boolean);const levelXP=u.points||0;const levels=[{name:'مبتدئ',max:300},{name:'متوسط',max:600},{name:'متقدم',max:1000},{name:'خبير',max:2000},{name:'أسطورة',max:9999}];const currentLvl=levels.find(l=>levelXP<l.max)||levels[levels.length-1];const prevMax=levels[levels.indexOf(currentLvl)-1]?.max||0;const progress=Math.min(100,((levelXP-prevMax)/(currentLvl.max-prevMax))*100);const dlBooks=DB.books.filter(b=>DB.favorites.some(f=>f.userId===u.id&&f.bookId===b.id));return`<h1>👤 ${u.full_name}</h1><div class="card" style="text-align:center;"><i class="fas fa-user-circle" style="font-size:4rem;color:var(--accent);"></i><span class="level-badge">⭐ ${currentLvl.name}</span><p style="color:var(--text-secondary);">🏫 ${u.university||'غير محدد'} | 📚 ${u.academic_year||'غير محدد'}</p><p>🏆 <strong>${levelXP}</strong> نقطة</p><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div><p style="font-size:0.7rem;color:var(--text-muted);">${Math.round(progress)}% للمستوى التالي</p><div>${(u.badges||[]).map(b=>`<span style="font-size:1.3rem;margin:0 0.15rem;">${b}</span>`).join('')||'لا شارات'}</div><p style="font-size:0.7rem;color:var(--text-muted);">📅 انضم: ${u.joined||'?'} | 🟢 آخر ظهور: ${u.lastSeen?new Date(u.lastSeen).toLocaleDateString('ar-SA'):'الآن'}</p></div>${attempts.length>0?`<div class="card"><h3>📊 سجل الاختبارات</h3><div class="chart-bar">${attempts.slice(-7).map(a=>`<div style="height:${a.score}%" title="${a.quizTitle}: ${a.score}%"></div>`).join('')}</div>${attempts.slice(-5).reverse().map(a=>`<div style="padding:0.3rem 0;border-bottom:1px solid var(--border);"><strong>${a.quizTitle}</strong> - ${a.score}% <span class="badge ${a.passed?'badge-success':'badge-danger'}">${a.passed?'ناجح':'راسب'}</span></div>`).join('')}</div>`:''}${dlBooks.length>0?`<div class="card"><h3>📥 سجل التحميلات</h3>${dlBooks.map(b=>`<p><i class="fas ${b.catIcon}"></i> ${b.title}</p>`).join('')}</div>`:''}${favs.length>0?`<div class="card"><h3>⭐ المفضلة</h3>${favs.map(b=>`<p>${b.title} <span class="badge badge-primary">${b.cat}</span></p>`).join('')}</div>`:''}<button class="btn btn-primary btn-sm" onclick="exportData()"><i class="fas fa-download"></i> تصدير بياناتي</button> <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>`},
    messages(){if(!APP.isLoggedIn())return RENDER.login();const msgs=DB.messages.filter(m=>m.fromId===APP.user.id||m.toId===APP.user.id);const users=DB.users.filter(u=>u.id!==APP.user.id);return`<h1>💬 الرسائل</h1><div class="cards-grid"><div class="card"><h3>📨 محادثة جديدة</h3><select class="form-control" id="msgUser">${users.map(u=>`<option value="${u.id}">${u.full_name}</option>`).join('')}</select><textarea class="form-control" id="msgContent" rows="2" placeholder="نص الرسالة..." style="margin-top:0.5rem;"></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="sendMessage()">إرسال</button></div></div><h3>📋 سجل المحادثات</h3>${msgs.length===0?'<p>لا توجد رسائل بعد</p>':msgs.slice(-10).reverse().map(m=>{const other=m.fromId===APP.user.id?DB.users.find(u=>u.id===m.toId):DB.users.find(u=>u.id===m.fromId);return`<div class="card"><p><strong>${other?.full_name||'مستخدم'}</strong>: ${m.content}</p><p style="font-size:0.7rem;color:var(--text-muted);">${new Date(m.date).toLocaleDateString('ar-SA')}</p></div>`}).join('')}`},
    admin(){if(!APP.isAdmin())return RENDER.login();return`<h1>⚙️ لوحة إدارة همام</h1><div class="stats-grid" style="margin:1rem 0;"><div class="stat-card"><i class="fas fa-users"></i><h3>${DB.users.length}</h3></div><div class="stat-card"><i class="fas fa-book"></i><h3>${DB.books.length}</h3></div><div class="stat-card"><i class="fas fa-comments"></i><h3>${DB.posts.length}</h3></div><div class="stat-card"><i class="fas fa-flag"></i><h3>${DB.reports.length}</h3></div><div class="stat-card"><i class="fas fa-bell"></i><h3>${DB.notifications.length}</h3></div><div class="stat-card"><i class="fas fa-envelope"></i><h3>${DB.messages.length}</h3></div></div><h2>👥 المستخدمين</h2>${DB.users.map(u=>`<div class="card"><p><strong>${u.full_name}</strong> | ${u.email} | ${u.role} | 🏆${u.points} | ${u.is_active?'✅':'❌'}</p><button class="btn btn-xs btn-danger" onclick="toggleUser(${u.id})">${u.is_active?'تعطيل':'تفعيل'}</button></div>`).join('')}<h2 style="margin-top:1rem;">🚩 البلاغات (${DB.reports.length})</h2>${DB.reports.length===0?'<p>لا توجد بلاغات</p>':DB.reports.map(r=>`<div class="card"><p>منشور #${r.postId} - ${r.reason} - بواسطة ${DB.users.find(u=>u.id===r.userId)?.full_name||'?'}</p></div>`).join('')}<button class="btn btn-gold btn-sm" style="margin-top:1rem;" onclick="backupData()"><i class="fas fa-download"></i> نسخ احتياطي</button>`},
    login(){return`<div class="card" style="max-width:420px;margin:2rem auto;"><h2 style="text-align:center;margin-bottom:1.2rem;">🔑 تسجيل الدخول</h2><div class="form-group"><label>البريد</label><input type="email" class="form-control" id="loginEmail" value="dr.humam@medicalstudent.com"></div><div class="form-group"><label>كلمة المرور</label><input type="password" class="form-control" id="loginPassword" value="Med@Humam2025#Secure"></div><button class="btn btn-primary" style="width:100%;" onclick="handleLogin()">دخول</button><p style="text-align:center;margin-top:0.6rem;font-size:0.8rem;"><a href="#" onclick="forgotPassword()" style="color:var(--danger);">نسيت كلمة المرور؟</a> | <a href="#" onclick="navigate('register')" style="color:var(--accent);">إنشاء حساب</a></p></div>`},
    register(){return`<div class="card" style="max-width:420px;margin:2rem auto;"><h2 style="text-align:center;margin-bottom:1.2rem;">✨ إنشاء حساب</h2><div class="form-group"><label>الاسم</label><input type="text" class="form-control" id="regName"></div><div class="form-group"><label>البريد</label><input type="email" class="form-control" id="regEmail"></div><div class="form-group"><label>كلمة المرور (8+)</label><input type="password" class="form-control" id="regPassword"></div><div class="form-group"><label>الجامعة</label><input type="text" class="form-control" id="regUni"></div><div class="form-group"><label>السنة</label><select class="form-control" id="regYear"><option value="">اختر</option><option>الأولى</option><option>الثانية</option><option>الثالثة</option><option>الرابعة</option><option>الخامسة</option><option>السادسة</option><option>امتياز</option></select></div><button class="btn btn-gold" style="width:100%;" onclick="handleRegister()">إنشاء</button><p style="text-align:center;margin-top:0.6rem;"><a href="#" onclick="navigate('login')">لديك حساب؟</a></p></div>`}
};

// Handlers
function handleLogin(){login($('#loginEmail').value.trim(),$('#loginPassword').value)}
function handleRegister(){register($('#regName').value.trim(),$('#regEmail').value.trim(),$('#regPassword').value,$('#regUni').value.trim(),$('#regYear').value)}
function filterLib(){const q=$('#libSearch').value.toLowerCase();$$('#booksGrid .book-card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(q)?'':'none')}
function filterLibCat(cat){$$('#catFilters button').forEach((b,i)=>b.classList.toggle('btn-primary',i===0?cat==='':b.textContent.trim().includes(cat)));$$('#booksGrid .book-card').forEach(c=>c.style.display=!cat||c.dataset.cat===cat?'':'none')}
function downloadBook(id){if(!APP.isLoggedIn()){showToast('سجل دخولك','error');navigate('login');return}const b=DB.books.find(b=>b.id===id);if(!b)return;b.downloads++;DB.persist('books');if(APP.user){APP.user.points+=10;DB.users=DB.users.map(u=>u.id===APP.user.id?APP.user:u);DB.persist('users')}if(b.hasPDF&&PDF_LINKS[id]){showToast(`📥 تحميل: ${b.title}`,'success');const a=document.createElement('a');a.href=PDF_LINKS[id];a.target='_blank';a.rel='noopener';a.download=b.title+'.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a)}else{showToast('⚠️ غير متاح','info')}}
function toggleFavorite(bookId){if(!APP.isLoggedIn()){showToast('سجل دخولك','error');navigate('login');return}const idx=DB.favorites.findIndex(f=>f.userId===APP.user.id&&f.bookId===bookId);if(idx>-1){DB.favorites.splice(idx,1);showToast('أزيل من المفضلة','info')}else{DB.favorites.push({userId:APP.user.id,bookId});showToast('⭐ أضيف!','success')}DB.persist('favorites')}
function reviewBook(bookId){const b=DB.books.find(b=>b.id===bookId);if(!b||!APP.isLoggedIn())return;const r=prompt(`تقييمك لـ "${b.title}" (1-5):`);if(!r||isNaN(r)||r<1||r>5)return;DB.reviews.push({userId:APP.user.id,bookId,rating:parseInt(r),date:new Date().toISOString()});DB.persist('reviews');b.rating=Math.round((DB.reviews.filter(rv=>rv.bookId===bookId).reduce((s,rv)=>s+rv.rating,0)/DB.reviews.filter(rv=>rv.bookId===bookId).length)*10)/10;DB.persist('books');showToast(`تم تقييم الكتاب ${'⭐'.repeat(r)}`,'success')}
function startQuiz(qid){if(!APP.isLoggedIn()){showToast('سجل دخولك','error');navigate('login');return}const q=DB.getQuizzes().find(q=>q.id===qid);if(!q)return;APP.quizState={quiz:q,answers:{},timeLeft:q.time*60,timer:null};$('#quizList').style.display='none';$('#quizArea').style.display='block';$('#quizArea').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;"><h2>${q.title}</h2><div class="timer" id="timerDisplay">${fmtTime(APP.quizState.timeLeft)}</div></div>${q.questions.map((q,i)=>`<div class="card" style="margin-bottom:0.5rem;"><h3>س${i+1}: ${q.text}</h3><div style="margin-top:0.5rem;">${['A','B','C','D'].map(o=>`<div class="quiz-option" onclick="selectQAns(${q.id},'${o}')" id="qo_${q.id}_${o}">${o}) ${q[o.toLowerCase()]}</div>`).join('')}</div></div>`).join('')}<button class="btn btn-gold" style="width:100%;padding:0.8rem;" onclick="submitQuiz()">تقديم</button></div>`;APP.quizState.timer=setInterval(()=>{APP.quizState.timeLeft--;const td=$('#timerDisplay');if(td)td.textContent=fmtTime(APP.quizState.timeLeft);if(APP.quizState.timeLeft<=0){clearInterval(APP.quizState.timer);submitQuiz()}},1000)}
function selectQAns(qid,opt){APP.quizState.answers[qid]=opt;['A','B','C','D'].forEach(o=>{const el=$('#qo_'+qid+'_'+o);if(el)el.classList.remove('selected')});$('#qo_'+qid+'_'+opt).classList.add('selected')}
function submitQuiz(){clearInterval(APP.quizState.timer);const q=APP.quizState.quiz;let c=0;q.questions.forEach(q=>{if(APP.quizState.answers[q.id]===q.correct)c++});const score=Math.round((c/q.questions.length)*100);const passed=score>=q.passing;if(APP.user){APP.user.points+=Math.round(score/2);DB.users=DB.users.map(u=>u.id===APP.user.id?APP.user:u);DB.persist('users')}DB.quizAttempts.push({userId:APP.user?.id,quizId:q.id,quizTitle:q.title,score,passed,date:new Date().toISOString().split('T')[0]});DB.persist('attempts');addNotification(APP.user?.id,`نتيجة ${q.title}: ${score}% ${passed?'✅':'❌'}`,'quiz');$('#quizArea').innerHTML=`<div class="card" style="text-align:center;"><i class="fas ${passed?'fa-trophy':'fa-book'}" style="font-size:3.5rem;color:${passed?'var(--gold)':'var(--danger)'};margin-bottom:0.4rem;"></i><h2>${passed?'🎉 ناجح!':'📚 راسب'}</h2><p style="font-size:1.8rem;margin:0.6rem 0;font-weight:900;">${score}%</p><p>✅ ${c} / ❌ ${q.questions.length-c} | 🏆 +${Math.round(score/2)} نقطة</p>${passed?`<button class="btn btn-gold btn-sm" onclick="generateCert('${q.title}',${score})"><i class="fas fa-certificate"></i> شهادة</button>`:''}<button class="btn btn-primary" onclick="navigate('quizzes')" style="margin-top:0.6rem;">عودة</button></div>`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
function generateCert(title,score){const h=`<div style="text-align:center;padding:1.5rem;border:4px solid var(--gold);border-radius:1rem;background:linear-gradient(135deg,#fef3c7,#fff);"><i class="fas fa-certificate" style="font-size:3rem;color:var(--gold);"></i><h2>شهادة إتمام</h2><p>تشهد منصة همام بأن</p><h3>${APP.user?.full_name||'الطالب'}</h3><p>أكمل <strong>${title}</strong> بنسبة <strong>${score}%</strong></p><p>${new Date().toLocaleDateString('ar-SA')}</p><p>توقيع: <strong>الدكتور همام</strong></p></div>`;openModal(h);showToast('🏆 تم إصدار الشهادة!','success')}
function showNewPost(){$('#newPostForm').style.display='block';$('#postTitle').focus()}
function createPost(){const t=$('#postTitle').value.trim(),c=$('#postContent').value.trim();if(!t||!c)return showToast('املأ الحقول','error');DB.posts.unshift({id:DB.posts.length+1,title:t,content:c,author:APP.user.full_name,authorId:APP.user.id,replies:[],likes:0,likedBy:[],date:new Date().toISOString().split('T')[0],cat:'عام'});DB.persist('posts');if(APP.user){APP.user.points+=20;DB.users=DB.users.map(u=>u.id===APP.user.id?APP.user:u);DB.persist('users')}$('#newPostForm').style.display='none';$('#postTitle').value='';$('#postContent').value='';showToast('تم النشر! +20 نقطة','success');navigate('forum')}
function viewPost(id){const p=DB.posts.find(x=>x.id===id);if(!p)return;let h=`<h2>${p.title}</h2><p style="margin:0.6rem 0;line-height:2;">${p.content}</p><p style="color:var(--text-muted);font-size:0.75rem;">👤 ${p.author} | ❤️ ${p.likes} | 📅 ${p.date}</p><div class="share-btns"><button class="share-btn" style="background:#25D366;" onclick="shareContent('${p.title}','${p.content.substring(0,50)}')"><i class="fab fa-whatsapp"></i> واتساب</button><button class="share-btn" style="background:#1DA1F2;" onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(p.title)}','_blank')"><i class="fab fa-twitter"></i> تويتر</button><button class="share-btn" style="background:#1877F2;" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}','_blank')"><i class="fab fa-facebook"></i> فيسبوك</button></div>`;if(p.replies&&p.replies.length>0){h+=`<h4 style="margin-top:0.8rem;">💬 الردود (${p.replies.length})</h4>`;p.replies.forEach(r=>{h+=`<div class="card" style="background:var(--bg);"><p>${r.content}</p><p style="font-size:0.7rem;color:var(--text-muted);">👤 ${r.author} | 📅 ${r.date}</p></div>`})}if(APP.isLoggedIn()){h+=`<div class="form-group" style="margin-top:0.8rem;"><textarea class="form-control" id="replyInput" rows="2" placeholder="أضف رداً..."></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.4rem;" onclick="addReply(${p.id})">رد</button></div>`}openModal(h)}
function addReply(postId){const c=$('#replyInput')?.value.trim();if(!c)return;const p=DB.posts.find(x=>x.id===postId);if(!p){closeModal();return}if(!p.replies)p.replies=[];p.replies.push({id:p.replies.length+1,content:c,author:APP.user.full_name,authorId:APP.user.id,date:new Date().toISOString().split('T')[0]});DB.persist('posts');if(APP.user){APP.user.points+=5;DB.users=DB.users.map(u=>u.id===APP.user.id?APP.user:u);DB.persist('users');addNotification(p.authorId,`${APP.user.full_name} رد على منشورك`,'reply')}closeModal();showToast('تم الرد! +5 نقاط','success');navigate('forum')}
function likePost(id){if(!APP.isLoggedIn()){showToast('سجل دخولك','error');return}const p=DB.posts.find(x=>x.id===id);if(!p)return;if(!p.likedBy)p.likedBy=[];if(p.likedBy.includes(APP.user.id)){p.likes--;p.likedBy=p.likedBy.filter(x=>x!==APP.user.id)}else{p.likes++;p.likedBy.push(APP.user.id);addNotification(p.authorId,`${APP.user.full_name} أعجب بمنشورك`,'like')}DB.persist('posts');navigate('forum')}
function sharePost(id){const p=DB.posts.find(x=>x.id===id);if(!p)return;shareContent(p.title,p.content.substring(0,50))}
function reportPost(id){if(!APP.isLoggedIn()){showToast('سجل دخولك','error');return}const reason=prompt('سبب البلاغ:');if(!reason)return;DB.reports.push({id:Date.now(),postId:id,userId:APP.user.id,reason,date:new Date().toISOString()});DB.persist('reports');showToast('تم إرسال البلاغ للمراجعة','success');addNotification(1,`بلاغ جديد على منشور #${id}`,'report')}
function formatText(type){const ta=$('#postContent');if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd;const v=ta.value;const sel=v.substring(s,e);let r='';if(type==='bold')r='**'+sel+'**';else if(type==='italic')r='*'+sel+'*';ta.value=v.substring(0,s)+r+v.substring(e)}
function sendMessage(){const toId=parseInt($('#msgUser')?.value);const c=$('#msgContent')?.value.trim();if(!toId||!c)return;DB.messages.push({id:Date.now(),fromId:APP.user.id,toId,content:c,date:new Date().toISOString()});DB.persist('messages');addNotification(toId,`رسالة جديدة من ${APP.user.full_name}`,'msg');$('#msgContent').value='';showToast('تم الإرسال!','success');navigate('messages')}
function exportData(){if(!APP.isLoggedIn())return;const data={user:APP.user,attempts:DB.quizAttempts.filter(a=>a.userId===APP.user.id),favorites:DB.favorites.filter(f=>f.userId===APP.user.id)};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='همام_بياناتي.json';a.click();showToast('تم تصدير بياناتك!','success')}
function backupData(){if(!APP.isAdmin())return;const data={users:DB.users,books:DB.books,posts:DB.posts,reports:DB.reports};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='همام_نسخة_احتياطية_'+new Date().toISOString().split('T')[0]+'.json';a.click();showToast('تم النسخ الاحتياطي!','success')}
function toggleUser(id){if(!APP.isAdmin())return;const u=DB.users.find(x=>x.id===id);if(!u||u.role==='admin')return;u.is_active=!u.is_active;DB.persist('users');showToast(u.is_active?'تم التفعيل':'تم التعطيل','info');navigate('admin')}
function runDiagnosis(){const s=$('#symptomsInput')?.value.trim();if(!s)return showToast('أدخل الأعراض','error');$('#diagnosisResult').innerHTML=`<div class="alert alert-info">• التهاب تنفسي (45%)<br>• إنفلونزا (30%)<br>• التهاب شعب (15%)<br>• حساسية (10%)<br><small>⚠️ أداة تعليمية</small></div>`}
function runSummary(){const t=$('#lectureInput')?.value.trim();if(!t)return showToast('أدخل النص','error');$('#summaryResult').innerHTML=`<div class="alert alert-info">تم تحليل ${t.length} حرف.</div>`}
function simulateECG(){const r=['نظم جيبي 70bpm','رجفان أذيني','تسرع بطيني','احصار AV','ارتفاع ST'];showToast('🫀 '+r[Math.floor(Math.random()*r.length)],'info')}

document.addEventListener('DOMContentLoaded',()=>{updateNav();navigate('home')});
</script>
</body>
</html>
