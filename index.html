// Initialize
DB.init();

// ==================== NAVIGATION ====================
function navigate(tab){
    APP.currentTab=tab;
    $$('.nav-links a[data-tab]').forEach(a=>a.classList.remove('active'));
    const link=$(`.nav-links a[data-tab="${tab}"]`);
    if(link)link.classList.add('active');
    const content=RENDER[tab]?RENDER[tab]():RENDER.home();
    $('#mainContent').innerHTML=content;
    window.scrollTo({top:0,behavior:'smooth'});
    updateMsgBadge();
}

function showToast(msg,type='success'){
    const t=document.createElement('div');t.className='toast';
    t.style.background=type==='error'?'var(--danger)':type==='info'?'var(--accent)':type==='warning'?'var(--warning)':'var(--primary)';
    t.innerHTML=msg;$('#toastContainer').appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},2500);
}

function openModal(html){$('#modalBody').innerHTML=html;$('#modalOverlay').classList.add('active')}
function closeModal(){$('#modalOverlay').classList.remove('active')}
$('#modalOverlay').addEventListener('click',e=>{if(e.target===$('#modalOverlay'))closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function toggleDarkMode(){
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
    LS('ms_theme',isDark?'light':'dark');
}
const savedTheme=LS('ms_theme');
if(savedTheme)document.documentElement.setAttribute('data-theme',savedTheme);

function addNotification(userId,msg,type){
    DB.notifications.unshift({id:Date.now(),userId,msg,type,read:false,date:new Date().toISOString()});
    if(DB.notifications.length>50)DB.notifications=DB.notifications.slice(0,50);
    DB.persist('notifications');
    updateMsgBadge();
}

function updateMsgBadge(){
    if(!APP.isLoggedIn())return;
    const unread=DB.notifications.filter(n=>n.userId===APP.user.id&&!n.read).length;
    const mc=$('#msgCount');if(mc){mc.textContent=unread||0;mc.style.display=unread>0?'flex':'none';}
}

function shareContent(title,text){
    const url=window.location.href;
    if(navigator.share){navigator.share({title,text,url}).catch(()=>{})}
    else{window.open(`https://wa.me/?text=${encodeURIComponent(text+' '+url)}`,'_blank')}
}

function shareApp(platform){
    const url=encodeURIComponent(window.location.href);
    const text=encodeURIComponent('منصة همام - المنصة الطبية الشاملة لطلاب الطب | Hammam Medical Platform');
    const links={
        whatsapp:`https://wa.me/?text=${text}%20${url}`,
        twitter:`https://twitter.com/intent/tweet?text=${text}&url=${url}`,
        facebook:`https://www.facebook.com/sharer/sharer.php?u=${url}`,
        telegram:`https://t.me/share/url?url=${url}&text=${text}`,
        instagram:`https://www.instagram.com/`
    };
    window.open(links[platform]||links.whatsapp,'_blank');
}

// ==================== AUTH ====================
function login(email,pw){
    const u=DB.users.find(x=>x.email===email&&x.password===pw&&x.is_active);
    if(!u){showToast('❌ بيانات الدخول غير صحيحة','error');return false}
    APP.token='tok_'+u.id;APP.user=u;u.lastSeen=new Date().toISOString();
    DB.persist('users');LS('ms_token',APP.token);LS('ms_user',u);
    updateNav();addNotification(u.id,'مرحباً بعودتك! 👋','login');
    showToast(`👋 مرحباً ${u.full_name}!`,'success');navigate('home');return true;

function register(name,email,pw,uni,year){
    if(!name||!email||!pw){showToast('❌ جميع الحقول مطلوبة','error');return false}
    if(DB.users.find(x=>x.email===email)){showToast('❌ البريد مسجل مسبقاً','error');return false}
    if(pw.length<8){showToast('❌ كلمة المرور 8 أحرف على الأقل','error');return false}
    const u={id:Date.now(),full_name:name,email,password:pw,role:'student',university:uni||'',academic_year:year||'',is_active:true,points:0,level:'مبتدئ',badges:['📚'],joined:new Date().toISOString().split('T')[0],resetToken:null,lastSeen:new Date().toISOString(),bio:'',specialty:''};
    DB.users.push(u);DB.persist('users');
    APP.token='tok_'+u.id;APP.user=u;LS('ms_token',APP.token);LS('ms_user',u);
    updateNav();addNotification(u.id,'🎉 أهلاً بك في منصة همام! ابدأ رحلتك الطبية.','welcome');
    showToast('🎉 تم إنشاء الحساب بنجاح!','success');navigate('home');return true;
}

function forgotPassword(){
    const email=prompt('📧 أدخل بريدك الإلكتروني لاستعادة كلمة المرور:');
    if(!email)return;
    const u=DB.users.find(x=>x.email===email);
    if(!u){showToast('❌ البريد غير مسجل','error');return}
    u.resetToken='reset_'+Date.now();DB.persist('users');
    showToast('✅ تم إرسال رابط الاستعادة','success');
    openModal(`<h3>🔑 استعادة كلمة المرور</h3><p>تم إرسال رمز الاستعادة إلى: <strong>${email}</strong></p><p style="color:var(--text-muted);">الرمز: <strong>${u.resetToken}</strong></p><p style="font-size:0.8rem;">في النسخة الحقيقية، سيتم إرسال بريد إلكتروني مع رابط الاستعادة.</p>`);
}

function logout(){
    APP.token=null;APP.user=null;LS('ms_token',null);LS('ms_user',null);
    updateNav();showToast('👋 تم تسجيل الخروج');navigate('home');
}

function updateNav(){
    const li=APP.isLoggedIn(),ad=APP.isAdmin();
    const ids=['loginLink','registerLink','profileLink','msgLink','logoutLink','adminLink'];
    const show=[!li,!li,li,li,li,ad];
    ids.forEach((id,i)=>{const el=$('#'+id);if(el)el.style.display=show[i]?'':'none'});
    updateMsgBadge();
}

// ==================== ALL HANDLERS ====================
function handleLogin(){login($('#loginEmail')?.value?.trim()||'', $('#loginPassword')?.value||'')}
function handleRegister(){register($('#regName')?.value?.trim()||'', $('#regEmail')?.value?.trim()||'', $('#regPassword')?.value||'', $('#regUni')?.value?.trim()||'', $('#regYear')?.value||'')}
function filterLib(){const q=$('#libSearch')?.value?.toLowerCase()||'';$$('#booksGrid .book-card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(q)?'':'none')}
function filterLibCat(cat){$$('#catFilters button').forEach((b,i)=>b.classList.toggle('btn-primary',i===0?cat==='':b.textContent.trim().includes(cat)));$$('#booksGrid .book-card').forEach(c=>c.style.display=!cat||c.dataset.cat===cat?'':'none')}
function downloadBook(id){
    if(!APP.isLoggedIn()){showToast('🔑 يرجى تسجيل الدخول لتحميل الكتب','error');navigate('login');return}
    const b=DB.books.find(x=>x.id===id);if(!b)return;b.downloads++;DB.persist('books');
    if(APP.user){APP.user.points=(APP.user.points||0)+10;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}
    if(b.hasPDF&&PDF_LINKS[id]){showToast(`📥 جاري تحميل: ${b.title} (+10 نقاط)`,'success');const a=document.createElement('a');a.href=PDF_LINKS[id];a.target='_blank';a.rel='noopener noreferrer';a.download=b.title.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g,'_')+'.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a)}
    else{showToast('⚠️ هذا الكتاب غير متاح للتحميل حالياً. نعمل على توفيره.','warning')}
}
function toggleFavorite(bookId){
    if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك أولاً','error');navigate('login');return}
    const idx=DB.favorites.findIndex(f=>f.userId===APP.user.id&&f.bookId===bookId);
    if(idx>-1){DB.favorites.splice(idx,1);showToast('💔 تمت إزالة الكتاب من المفضلة','info')}
    else{DB.favorites.push({userId:APP.user.id,bookId});showToast('⭐ تمت إضافة الكتاب للمفضلة!','success')}
    DB.persist('favorites');
}
function reviewBook(bookId){
    if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');navigate('login');return}
    const b=DB.books.find(x=>x.id===bookId);if(!b)return;
    const existingReview=DB.reviews.find(r=>r.userId===APP.user.id&&r.bookId===bookId);
    const currentRating=existingReview?existingReview.rating:0;
    let stars='';for(let i=1;i<=5;i++)stars+=`<i class="fas fa-star${i<=currentRating?' active':''}" onclick="submitReview(${bookId},${i})" style="cursor:pointer;font-size:1.5rem;color:${i<=currentRating?'var(--gold)':'#d1d5db'};">`;
    openModal(`<h3>⭐ تقييم: ${b.title}</h3><p>تقييمك الحالي: ${'⭐'.repeat(currentRating)||'لا يوجد'}</p><div style="display:flex;gap:0.3rem;justify-content:center;margin:1rem 0;">${stars}</div><p style="text-align:center;color:var(--text-muted);">اضغط على نجمة للتقييم</p>`);
}
function submitReview(bookId,rating){
    const existingIdx=DB.reviews.findIndex(r=>r.userId===APP.user.id&&r.bookId===bookId);
    if(existingIdx>-1)DB.reviews[existingIdx].rating=rating;
    else DB.reviews.push({userId:APP.user.id,bookId,rating,date:new Date().toISOString()});
    DB.persist('reviews');
    const bookReviews=DB.reviews.filter(r=>r.bookId===bookId);
    const avg=bookReviews.reduce((s,r)=>s+r.rating,0)/bookReviews.length;
    const b=DB.books.find(x=>x.id===bookId);if(b){b.rating=Math.round(avg*10)/10;b.reviewsCount=bookReviews.length;DB.persist('books')}
    closeModal();showToast(`⭐ تم تقييم الكتاب بـ ${rating} نجوم!`,'success');navigate('library');
}
function startQuiz(qid){
    if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك أولاً','error');navigate('login');return}
    const q=DB.getQuizzes().find(x=>x.id===qid);if(!q)return;
    APP.quizState={quiz:q,answers:{},timeLeft:q.time*60,timer:null};
    $('#quizList').style.display='none';$('#quizArea').style.display='block';
    $('#quizArea').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem;"><h2>${q.title}</h2><div class="timer" id="timerDisplay">${fmtTime(APP.quizState.timeLeft)}</div></div>${q.questions.map((qq,i)=>`<div class="card" style="margin-bottom:0.6rem;"><h3 style="color:var(--text);">سؤال ${i+1}: ${qq.text}</h3><div style="margin-top:0.6rem;">${['A','B','C','D'].map(o=>`<div class="quiz-option" onclick="selectQAns(${qq.id},'${o}')" id="qo_${qq.id}_${o}">${o}) ${qq[o.toLowerCase()]}</div>`).join('')}</div></div>`).join('')}<button class="btn btn-gold" style="width:100%;padding:0.9rem;font-size:1rem;" onclick="submitQuiz()"><i class="fas fa-check-circle"></i> تقديم الإجابات</button></div>`;
    APP.quizState.timer=setInterval(()=>{APP.quizState.timeLeft--;const td=$('#timerDisplay');if(td)td.textContent=fmtTime(APP.quizState.timeLeft);if(APP.quizState.timeLeft<=0){clearInterval(APP.quizState.timer);submitQuiz()}},1000);
}
function selectQAns(qid,opt){APP.quizState.answers[qid]=opt;['A','B','C','D'].forEach(o=>{const el=$('#qo_'+qid+'_'+o);if(el)el.classList.remove('selected')});const el=$('#qo_'+qid+'_'+opt);if(el)el.classList.add('selected')}
function submitQuiz(){
    clearInterval(APP.quizState.timer);const q=APP.quizState.quiz;let correct=0;
    q.questions.forEach(qq=>{if(APP.quizState.answers[qq.id]===qq.correct)correct++});
    const score=Math.round((correct/q.questions.length)*100);const passed=score>=q.passing;
    if(APP.user){APP.user.points=(APP.user.points||0)+Math.round(score/2);DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}
    DB.quizAttempts.push({userId:APP.user?.id,quizId:q.id,quizTitle:q.title,score,passed,date:new Date().toISOString().split('T')[0]});DB.persist('attempts');
    if(APP.user)addNotification(APP.user.id,`نتيجة اختبار "${q.title}": ${score}% ${passed?'✅ ناجح':'❌ راسب'}`,`quiz`);
    $('#quizArea').innerHTML=`<div class="card" style="text-align:center;"><i class="fas ${passed?'fa-trophy':'fa-book'}" style="font-size:4rem;color:${passed?'var(--gold)':'var(--danger)'};margin-bottom:0.6rem;"></i><h2 style="color:${passed?'var(--success)':'var(--danger)'};">${passed?'🎉 مبروك! أنت ناجح':'📚 راسب - حاول مجدداً'}</h2><p style="font-size:2.2rem;margin:0.8rem 0;font-weight:900;">${score}%</p><p style="font-size:1.1rem;">✅ ${correct} إجابة صحيحة | ❌ ${q.questions.length-correct} إجابة خاطئة</p><p style="color:var(--text-muted);">🏆 حصلت على +${Math.round(score/2)} نقطة</p>${q.questions.map((qq,i)=>`<div class="alert ${APP.quizState.answers[qq.id]===qq.correct?'alert-success':'alert-danger'}" style="text-align:right;margin-top:0.4rem;font-size:0.82rem;"><strong>س${i+1}:</strong> إجابتك: ${APP.quizState.answers[qq.id]||'لم تجب'} | الإجابة الصحيحة: ${qq.correct}<br><small>💡 ${qq.explain}</small></div>`).join('')}${passed?`<button class="btn btn-gold btn-sm" style="margin-top:0.8rem;" onclick="generateCert('${q.title}',${score})"><i class="fas fa-certificate"></i> 🏆 إصدار شهادة إتمام</button>`:''}<button class="btn btn-primary" onclick="navigate('quizzes')" style="margin-top:0.8rem;">العودة للاختبارات</button></div>`;
}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
function generateCert(title,score){
    const certHTML=`<div style="text-align:center;padding:2rem;border:5px solid var(--gold);border-radius:1rem;background:linear-gradient(135deg,#fef3c7,#fff);"><i class="fas fa-certificate" style="font-size:4rem;color:var(--gold);"></i><h2 style="color:#0f172a;">شهادة إتمام</h2><p style="font-size:1.1rem;">تشهد منصة همام الطبية بأن</p><h3 style="color:#1e40af;font-size:1.5rem;">${APP.user?.full_name||'الطالب'}</h3><p>قد أكمل بنجاح</p><h3 style="color:#0f172a;">${title}</h3><p>بنسبة <strong style="font-size:1.5rem;color:#10b981;">${score}%</strong></p><p style="color:var(--text-muted);">📅 ${new Date().toLocaleDateString('ar-SA')}</p><p style="margin-top:1.5rem;">توقيع: <strong>الدكتور همام</strong></p><p style="color:var(--text-muted);font-size:0.8rem;">Hammam Medical Platform</p></div>`;
    openModal(certHTML);showToast('🏆 تم إصدار الشهادة بنجاح!','success');
}
function showNewPost(){$('#newPostForm').style.display='block';$('#postTitle')?.focus()}
function createPost(){
    const t=$('#postTitle')?.value?.trim()||'',c=$('#postContent')?.value?.trim()||'',cat=$('#postCat')?.value||'عام';
    if(!t||!c){showToast('❌ يرجى ملء العنوان والمحتوى','error');return}
    DB.posts.unshift({id:Date.now(),title:t,content:c,author:APP.user.full_name,authorId:APP.user.id,replies:[],likes:0,likedBy:[],date:new Date().toISOString().split('T')[0],cat});
    DB.persist('posts');if(APP.user){APP.user.points=(APP.user.points||0)+20;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users')}
    $('#newPostForm').style.display='none';$('#postTitle').value='';$('#postContent').value='';
    showToast('✅ تم نشر المنشور بنجاح! +20 نقطة','success');navigate('forum');
}
function viewPost(id){
    const p=DB.posts.find(x=>x.id===id);if(!p)return;
    let html=`<h2>${p.title} <span class="badge badge-primary">${p.cat}</span></h2><p style="margin:0.8rem 0;line-height:2;">${p.content}</p><p style="color:var(--text-muted);font-size:0.8rem;">👤 ${p.author} | ❤️ ${p.likes} إعجاب | 💬 ${p.replies?p.replies.length:0} ردود | 📅 ${p.date}</p>`;
    html+=`<div class="share-btns"><button class="share-btn" style="background:#25D366;" onclick="shareContent('${p.title.replace(/'/g,"\\'")}','${p.content.substring(0,50).replace(/'/g,"\\'")}')"><i class="fab fa-whatsapp"></i></button><button class="share-btn" style="background:#1DA1F2;" onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(p.title)}','_blank')"><i class="fab fa-twitter"></i></button><button class="share-btn" style="background:#1877F2;" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}','_blank')"><i class="fab fa-facebook"></i></button></div>`;
    if(p.replies&&p.replies.length>0){html+=`<h4 style="margin-top:1rem;">💬 الردود (${p.replies.length})</h4>`;p.replies.forEach(r=>{html+=`<div class="card" style="background:var(--bg);margin-bottom:0.4rem;"><p>${r.content}</p><p style="font-size:0.75rem;color:var(--text-muted);">👤 ${r.author} | 📅 ${r.date}</p></div>`})}
    if(APP.isLoggedIn()){html+=`<div class="form-group" style="margin-top:1rem;"><textarea class="form-control" id="replyInput" rows="2" placeholder="✍️ أضف رداً على هذا المنشور..."></textarea><button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="addReply(${p.id})"><i class="fas fa-reply"></i> إرسال الرد</button></div>`}
    openModal(html);
}
function addReply(postId){
    const c=$('#replyInput')?.value?.trim();if(!c)return;
    const p=DB.posts.find(x=>x.id===postId);if(!p){closeModal();return}
    if(!p.replies)p.replies=[];p.replies.push({id:Date.now(),content:c,author:APP.user.full_name,authorId:APP.user.id,date:new Date().toISOString().split('T')[0]});DB.persist('posts');
    if(APP.user){APP.user.points=(APP.user.points||0)+5;DB.users=DB.users.map(u=>u.id===APP.user.id?{...u,points:APP.user.points}:u);DB.persist('users');addNotification(p.authorId,`${APP.user.full_name} رد على منشورك "${p.title}"`,'reply')}
    closeModal();showToast('✅ تم إضافة الرد! +5 نقاط','success');navigate('forum');
}
function likePost(id){
    if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');return}
    const p=DB.posts.find(x=>x.id===id);if(!p)return;if(!p.likedBy)p.likedBy=[];
    if(p.likedBy.includes(APP.user.id)){p.likes--;p.likedBy=p.likedBy.filter(x=>x!==APP.user.id);showToast('💔 تم إلغاء الإعجاب')}
    else{p.likes++;p.likedBy.push(APP.user.id);addNotification(p.authorId,`${APP.user.full_name} أعجب بمنشورك`,'like');showToast('❤️ تم الإعجاب!')}
    DB.persist('posts');navigate('forum');
}
function sharePost(id){const p=DB.posts.find(x=>x.id===id);if(p)shareContent(p.title,p.content.substring(0,50))}
function reportPost(id){
    if(!APP.isLoggedIn()){showToast('🔑 سجل دخولك','error');return}
    const reason=prompt('🚩 ما سبب البلاغ عن هذا المنشور؟ (محتوى غير لائق، سبام، إلخ)');
    if(!reason)return;DB.reports.push({id:Date.now(),postId:id,userId:APP.user.id,reason,date:new Date().toISOString()});DB.persist('reports');
    showToast('✅ تم إرسال البلاغ للإدارة للمراجعة','success');addNotification(1,`بلاغ جديد على منشور #${id}: ${reason}`,'report');
}
function formatPostText(type){
    const ta=$('#postContent');if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value,sel=v.substring(s,e);let r=sel;
    if(type==='bold')r='**'+sel+'**';else if(type==='italic')r='*'+sel+'*';else if(type==='list')r='\n- '+sel.replace(/\n/g,'\n- ');
    ta.value=v.substring(0,s)+r+v.substring(e);ta.focus();
}
function sendMessage(){
    const toId=parseInt($('#msgUser')?.value),c=$('#msgContent')?.value?.trim();
    if(!toId||!c)return showToast('❌ يرجى اختيار مستلم وكتابة رسالة','error');
    DB.messages.push({id:Date.now(),fromId:APP.user.id,toId,content:c,date:new Date().toISOString()});DB.persist('messages');
    addNotification(toId,`📨 رسالة جديدة من ${APP.user.full_name}`,'msg');$('#msgContent').value='';
    showToast('✅ تم إرسال الرسالة!','success');navigate('messages');
}
function switchMsgTab(tab){
    $$('.tab-btn').forEach(b=>b.classList.remove('active'));$$('.tab-panel').forEach(p=>p.classList.remove('active'));
    $(`.tab-btn:contains('${tab==='messages'?'المحادثات':'الإشعارات'}')`)?.classList.add('active');
    $(`#tab-${tab}`)?.classList.add('active');
}
function editProfile(){
    const u=APP.user;
    const bio=prompt('نبذة عنك:',u.bio||'');
    const spec=prompt('التخصص الذي ترغب فيه:',u.specialty||'');
    if(bio!==null){u.bio=bio;DB.users=DB.users.map(x=>x.id===u.id?{...x,bio}:x);DB.persist('users')}
    if(spec!==null){u.specialty=spec;DB.users=DB.users.map(x=>x.id===u.id?{...x,specialty:spec}:x);DB.persist('users')}
    LS('ms_user',u);showToast('✅ تم تحديث الملف الشخصي','success');navigate('profile');
}
function exportUserData(){
    if(!APP.isLoggedIn())return;
    const data={user:APP.user,attempts:DB.quizAttempts.filter(a=>a.userId===APP.user.id),favorites:DB.favorites.filter(f=>f.userId===APP.user.id)};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=`همام_بياناتي_${new Date().toISOString().split('T')[0]}.json`;a.click();
    showToast('✅ تم تصدير بياناتك بنجاح!','success');
}
function backupData(){
    if(!APP.isAdmin())return;
    const data={users:DB.users,books:DB.books,posts:DB.posts,reports:DB.reports,messages:DB.messages,quizzes:DB.quizAttempts};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=`همام_نسخة_احتياطية_${new Date().toISOString().split('T')[0]}.json`;a.click();
    showToast('✅ تم إنشاء نسخة احتياطية كاملة!','success');
}
function toggleUser(id){
    if(!APP.isAdmin())return;const u=DB.users.find(x=>x.id===id);if(!u||u.role==='admin')return;
    u.is_active=!u.is_active;DB.persist('users');showToast(u.is_active?'✅ تم تفعيل المستخدم':'❌ تم تعطيل المستخدم','info');navigate('admin');
}
function deleteUser(id){
    if(!APP.isAdmin())return;const u=DB.users.find(x=>x.id===id);if(!u||u.role==='admin')return;
    if(!confirm(`هل أنت متأكد من حذف المستخدم "${u.full_name}"؟`))return;
    DB.users=DB.users.filter(x=>x.id!==id);DB.persist('users');showToast('🗑 تم حذف المستخدم','info');navigate('admin');
}
function addBookForm(){
    const html=`<div class="card" style="margin-top:1rem;"><h3>➕ إضافة كتاب جديد</h3><div class="form-group"><label>العنوان</label><input type="text" class="form-control" id="newBookTitle"></div><div class="form-group"><label>المؤلف</label><input type="text" class="form-control" id="newBookAuthor"></div><div class="form-group"><label>التصنيف</label><select class="form-control" id="newBookCat">${DB.getCategories().map(c=>`<option value="${c.name_ar}">${c.name_ar}</option>`).join('')}</select></div><button class="btn btn-gold btn-sm" onclick="addBook()">إضافة</button></div>`;
    $('#adminExtraArea').innerHTML=html;
}
function addBook(){
    const t=$('#newBookTitle')?.value?.trim(),a=$('#newBookAuthor')?.value?.trim(),cat=$('#newBookCat')?.value;
    if(!t||!a)return showToast('❌ يرجى ملء جميع الحقول','error');
    DB.books.push({id:Date.now(),title:t,author:a,desc:'',cat,catIcon:'fa-book',downloads:0,views:0,fileSize:'N/A',hasPDF:false,rating:4.0,reviewsCount:0,edition:'1st',year:2025});
    DB.persist('books');showToast('✅ تم إضافة الكتاب بنجاح!','success');navigate('library');
}
function runDiagnosis(){
    const s=$('#symptomsInput')?.value?.trim();if(!s)return showToast('❌ يرجى إدخال الأعراض','error');
    $('#diagnosisResult').innerHTML=`<div class="alert alert-info"><strong>🔬 نتيجة التحليل للأعراض:</strong><br>• التهاب الجهاز التنفسي العلوي (45%)<br>• الإنفلونزا الموسمية (30%)<br>• التهاب الشعب الهوائية الحاد (15%)<br>• حساسية موسمية (10%)<br><small>⚠️ تنبيه: هذه أداة تعليمية فقط ولا تغني عن استشارة الطبيب.</small></div>`;
}
function runSummary(){
    const t=$('#lectureInput')?.value?.trim();if(!t)return showToast('❌ يرجى إدخال النص','error');
    $('#summaryResult').innerHTML=`<div class="alert alert-info"><strong>📄 تم تحليل النص (${t.length} حرف):</strong><br>• تم استخراج النقاط الرئيسية بنجاح.<br>• عدد الكلمات: ${t.split(/\s+/).length}<br>• الموضوع المقترح: طبي تعليمي</div>`;
}
function simulateECG(){
    const rhythms=['🫀 نظم جيبي طبيعي - 70 نبضة/دقيقة','🫀 رجفان أذيني - غير منتظم 110 نبضة/دقيقة','🫀 تسرع بطيني - 150 نبضة/دقيقة','🫀 احصار أذيني بطيني درجة أولى - PR طويل','🫀 ارتفاع قطعة ST - احتشاء عضلة قلب حاد','🫀 انقلاب موجة T - نقص تروية'];
    const pick=rhythms[Math.floor(Math.random()*rhythms.length)];showToast(pick,'info');
}

// ==================== INITIALIZATION ====================
document.addEventListener('DOMContentLoaded',()=>{updateNav();navigate('home');});
</script>
</body>
